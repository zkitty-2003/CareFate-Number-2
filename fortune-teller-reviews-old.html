<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CareFate - คะแนนรีวิวหมอดู AI</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=10">
    <style>
        .review-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.3s ease both;
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .teller-icon-box {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
        }

        .teller-info { flex: 1; }

        .teller-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.1rem;
        }

        .teller-expert {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        .rating-summary { text-align: right; }

        .score-big {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
            margin-bottom: 0.2rem;
        }

        .score-stars { color: #facc15; font-size: 0.7rem; }

        .review-count {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 0.2rem;
        }

        .user-review {
            background: #f8fafc;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.5rem;
        }

        .user-review:last-child { margin-bottom: 0; }

        .ur-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .ur-name {
            font-size: 0.8rem;
            font-weight: 700;
            color: #334155;
        }

        .ur-stars { color: #facc15; font-size: 0.65rem; }

        .ur-text {
            font-size: 0.8rem;
            color: #475569;
            line-height: 1.5;
        }

        .ur-time {
            font-size: 0.65rem;
            color: #94a3b8;
            margin-top: 0.3rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .empty-state p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .no-feedback {
            font-style: italic;
            color: #94a3b8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body.theme-youth .app-container { background: #FAF9FF !important; }
        body.theme-working .app-container { background: #f0f9ff !important; }
        body.theme-elder .app-container { background: #fff7ed !important; }

        @media (min-width: 481px) {
            .app-container {
                border: 10px solid #ffffff !important;
                border-radius: 64px !important;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            }
        }

        #loadingSpinner {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="theme-youth">
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="app-container" style="display:flex; flex-direction:column; padding:0 !important; overflow:hidden; position:relative;">
        
        <!-- Background Aura -->
        <div style="position:absolute; top:-5%; right:-10%; width:400px; height:400px; background:rgba(216,180,254,0.3); filter:blur(100px); border-radius:50%; z-index:0; pointer-events:none;"></div>
        <div style="position:absolute; top:20%; left:-15%; width:350px; height:350px; background:rgba(191,219,254,0.4); filter:blur(90px); border-radius:50%; z-index:0; pointer-events:none;"></div>

        <!-- Header -->
        <div style="padding: 1.5rem 1.5rem 0.5rem; display:flex; align-items:center; background: transparent; z-index: 10; flex-shrink: 0;">
            <button onclick="history.back()"
                style="background:none; border:none; padding:0.5rem; cursor:pointer; color:#1e293b; display:flex; align-items:center; justify-content:center; width:40px; height:40px; border-radius:12px; background:#ffffff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition:background 0.2s;">
                <i class="fa-solid fa-arrow-left" style="font-size:1.1rem;"></i>
            </button>
            <h1 style="flex:1; text-align:center; font-size:1.15rem; margin:0; font-weight:700; color:#0f172a; padding-right:40px;">
                คะแนนรีวิวหมอดู
            </h1>
        </div>

        <!-- Content -->
        <div class="scrollable-content" style="flex:1; overflow-y:auto; padding: 1rem 1.5rem; padding-bottom: 2rem; z-index: 10; position:relative;">
            <div id="loadingSpinner">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:1.5rem; margin-bottom:0.5rem; display:block;"></i>
                กำลังโหลดรีวิว...
            </div>
            <div id="reviewsContainer"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://rjszmmogkiblqojikcow.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RoboGAH-Nqm1dQi3ORqYUQ_StZ7uU4Y';

        // Teller metadata
        const TELLERS = [
            { id: 'love',    name: 'แม่หมอจันทรา', expert: 'ด้านความรัก',      icon: 'fa-regular fa-heart',   gradient: 'linear-gradient(135deg, #f472b6, #f43f5e)' },
            { id: 'finance', name: 'ซินแสเศรษฐี',   expert: 'ด้านการเงิน',      icon: 'fa-solid fa-coins',     gradient: 'linear-gradient(135deg, #facc15, #f97316)' },
            { id: 'work',    name: 'อาจารย์ดวงดาว', expert: 'ด้านการงาน',       icon: 'fa-solid fa-briefcase', gradient: 'linear-gradient(135deg, #60a5fa, #4f46e5)' },
            { id: 'health',  name: 'ผู้เฒ่าโอสถ',   expert: 'ด้านสุขภาพ',       icon: 'fa-solid fa-leaf',      gradient: 'linear-gradient(135deg, #34d399, #0d9488)' },
            { id: 'overall', name: 'เซนมาสเตอร์',   expert: 'ด้านภาพรวมชีวิต', icon: 'fa-solid fa-yin-yang',  gradient: 'linear-gradient(135deg, #c084fc, #7c3aed)' },
        ];

        function starsHTML(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating)) {
                    html += '<i class="fa-solid fa-star"></i>';
                } else if (i - rating < 1) {
                    html += '<i class="fa-solid fa-star-half-stroke"></i>';
                } else {
                    html += '<i class="fa-regular fa-star"></i>';
                }
            }
            return html;
        }

        function timeAgo(dateStr) {
            const now = new Date();
            const then = new Date(dateStr);
            const diffMs = now - then;
            const diffMin = Math.floor(diffMs / 60000);
            const diffHr = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHr / 24);
            const diffWk = Math.floor(diffDay / 7);

            if (diffMin < 1) return 'เมื่อกี้นี้';
            if (diffMin < 60) return `${diffMin} นาทีที่แล้ว`;
            if (diffHr < 24) return `${diffHr} ชั่วโมงที่แล้ว`;
            if (diffDay < 7) return `${diffDay} วันที่แล้ว`;
            return `${diffWk} สัปดาห์ที่แล้ว`;
        }

        function renderReviews(allReviews, profiles) {
            const container = document.getElementById('reviewsContainer');
            container.innerHTML = '';

            // Map user_id → username
            const usernameMap = {};
            (profiles || []).forEach(p => { usernameMap[p.id] = p.username || 'ผู้ใช้'; });

            // Group reviews by teller_id
            const grouped = {};
            TELLERS.forEach(t => { grouped[t.id] = []; });
            allReviews.forEach(r => {
                if (grouped[r.teller_id] !== undefined) {
                    grouped[r.teller_id].push(r);
                }
            });

            let hasAnyReview = false;

            TELLERS.forEach((teller, idx) => {
                const reviews = grouped[teller.id];
                if (reviews.length === 0) return; // Skip tellers with no reviews
                hasAnyReview = true;

                const avg = reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length;
                const count = reviews.length;

                // Sort newest first, take latest 3 with feedback
                const withFeedback = reviews
                    .filter(r => r.feedback && r.feedback.trim() !== '')
                    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
                    .slice(0, 3);

                const card = document.createElement('div');
                card.className = 'review-card';
                card.style.animationDelay = `${idx * 0.07}s`;

                const reviewsHTML = withFeedback.length > 0
                    ? withFeedback.map(r => `
                        <div class="user-review">
                            <div class="ur-header">
                                <div class="ur-name">${usernameMap[r.user_id] || 'ผู้ใช้'}</div>
                                <div class="ur-stars">${starsHTML(r.rating)}</div>
                            </div>
                            <div class="ur-text">"${r.feedback}"</div>
                            <div class="ur-time">${timeAgo(r.created_at)}</div>
                        </div>
                    `).join('')
                    : `<div class="user-review"><div class="ur-text no-feedback">ยังไม่มีความคิดเห็น</div></div>`;

                card.innerHTML = `
                    <div class="review-header">
                        <div class="teller-icon-box" style="background: ${teller.gradient};">
                            <i class="${teller.icon}"></i>
                        </div>
                        <div class="teller-info">
                            <div class="teller-name">${teller.name}</div>
                            <div class="teller-expert">${teller.expert}</div>
                        </div>
                        <div class="rating-summary">
                            <div class="score-big">${avg.toFixed(1)}</div>
                            <div class="score-stars">${starsHTML(avg)}</div>
                            <div class="review-count">(${count} รีวิว)</div>
                        </div>
                    </div>
                    ${reviewsHTML}
                `;

                container.appendChild(card);
            });

            if (!hasAnyReview) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-star"></i>
                        <p>ยังไม่มีรีวิวในระบบ<br>เป็นคนแรกที่ให้คะแนนหมอดู AI ได้เลย!</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Apply theme
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user?.user_metadata?.theme) {
                    document.body.className = `theme-${user.user_metadata.theme}`;
                }
            } catch (e) {}

            // Load real reviews
            const spinner = document.getElementById('loadingSpinner');
            try {
                const { data: reviews, error } = await _supabase
                    .from('teller_reviews')
                    .select('teller_id, rating, feedback, created_at, user_id')
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Supabase SELECT error:', error);
                    spinner.innerHTML = `
                        <i class="fa-solid fa-triangle-exclamation" style="font-size:1.5rem; color:#f97316; margin-bottom:0.5rem; display:block;"></i>
                        <span style="font-size:0.75rem; color:#ef4444;">Error: ${error.message}</span>
                    `;
                    return;
                }

                console.log('Reviews loaded:', reviews);

                // Load usernames from profiles
                let profiles = [];
                if (reviews && reviews.length > 0) {
                    const userIds = [...new Set(reviews.map(r => r.user_id))];
                    const { data: profileData, error: profErr } = await _supabase
                        .from('profiles')
                        .select('id, username')
                        .in('id', userIds);
                    if (profErr) console.warn('Profile fetch error:', profErr);
                    profiles = profileData || [];
                }

                spinner.style.display = 'none';
                renderReviews(reviews || [], profiles);

            } catch (e) {
                console.error('Error loading reviews:', e);
                spinner.innerHTML = `
                    <i class="fa-solid fa-triangle-exclamation" style="font-size:1.5rem; color:#f97316; margin-bottom:0.5rem; display:block;"></i>
                    <span style="font-size:0.75rem; color:#ef4444;">${e.message}</span>
                `;
            }
        });
    </script>
</body>

</html>
