<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFate - เลือกฟีเจอร์</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=10">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
            width: 100%;
            padding-bottom: 1rem;
        }

        .feature-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1rem 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            gap: 0.4rem;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .feature-card.selected {
            background: white;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.25);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.25rem;
            color: var(--text-muted);
            transition: all 0.3s;
            opacity: 0.7;
        }

        .feature-card.selected .feature-icon {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 1;
            transform: scale(1.1);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .feature-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-color);
            line-height: 1.3;
        }

        .recommend-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #10b981;
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.5s ease-out;
        }

        .checkbox-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .feature-card.selected .checkbox-overlay {
            background: #a855f7;
            border-color: #a855f7;
        }

        .checkbox-overlay i {
            color: white;
            font-size: 0.7rem;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s;
        }

        .feature-card.selected .checkbox-overlay i {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Custom Scrollbar */
        .feature-grid::-webkit-scrollbar {
            width: 4px;
        }

        .feature-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .feature-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        /* ===== GLOBAL THEME REDESIGN (Match Dashboard Frame) ===== */
        body.theme-youth,
        body.theme-working,
        body.theme-elder {
            background: #d1d5db !important; /* Gray outer background like React preview */
            position: relative;
        }

        /* App Container / Phone Frame */
        body.theme-youth .app-container,
        body.theme-working .app-container,
        body.theme-elder .app-container {
            border: 10px solid #ffffff !important;
            border-radius: 64px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            backdrop-filter: none !important;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }
        
        body.theme-youth .app-container { background: #FAF9FF !important; }
        body.theme-working .app-container { background: #f0f9ff !important; }
        body.theme-elder .app-container { background: #fff7ed !important; }

        /* Aura Backgrounds (Hidden for pure white background) */
        body.theme-youth .app-container::before,
        body.theme-youth .app-container::after {
            display: none !important;
        }

        /* ===== ELDER THEME OVERRIDES FOR FEATURE SELECTION ===== */
        body.theme-elder .app-name {
            font-size: 2.2rem !important;
            color: #ea580c !important;
            -webkit-text-fill-color: #ea580c !important;
            font-weight: 800;
        }
        body.theme-elder .tagline {
            font-size: 1.2rem !important;
            color: #9a3412 !important;
            margin-top: 0.5rem;
        }
        body.theme-elder p {
            font-size: 1.1rem !important;
            color: #78350f !important;
            font-weight: 600 !important;
        }
        body.theme-elder .feature-card {
            border: 2px solid #fdba74 !important;
            background: #fff !important;
            border-radius: 24px !important;
            padding: 1.5rem 1rem !important;
        }
        body.theme-elder .feature-card.selected {
            border-color: #ea580c !important;
            background: #fff7ed !important;
            box-shadow: 0 8px 20px rgba(234, 88, 12, 0.2) !important;
        }
        body.theme-elder .feature-icon {
            font-size: 2.8rem !important;
            color: #fdba74 !important;
        }
        body.theme-elder .feature-card.selected .feature-icon {
            background: none !important;
            -webkit-text-fill-color: #ea580c !important;
            color: #ea580c !important;
        }
        body.theme-elder .feature-title {
            font-size: 1.2rem !important;
            font-weight: 800 !important;
            color: #431407 !important;
            margin-top: 0.5rem;
        }
        body.theme-elder .checkbox-overlay {
            width: 26px !important;
            height: 26px !important;
            border: 2px solid #fdba74 !important;
        }
        body.theme-elder .feature-card.selected .checkbox-overlay {
            background: #ea580c !important;
            border-color: #ea580c !important;
        }
        body.theme-elder .checkbox-overlay i {
            font-size: 1rem !important;
        }
        body.theme-elder .recommend-badge {
            background: #ea580c !important;
            font-size: 0.8rem !important;
            padding: 4px 10px !important;
        }
        body.theme-elder .btn-primary {
            font-size: 1.3rem !important;
            padding: 1.2rem !important;
            background: linear-gradient(135deg, #ea580c, #d97706) !important;
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.3) !important;
            border-radius: 30px !important;
        }
        body.theme-elder .logo-icon {
            background: linear-gradient(135deg, #ea580c, #d97706) !important;
            width: 70px !important;
            height: 70px !important;
            font-size: 2.2rem !important;
            display: flex; align-items: center; justify-content: center;
            border-radius: 20px;
        }
        body.theme-elder .logo-icon i {
            color: white;
        }
    </style>
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="app-container" style="position:relative; display:flex; flex-direction:column; overflow:hidden; padding:0 !important;">
        <!-- Status Bar -->
        <div class="status-bar" style="position:relative; z-index:20; height:56px; width:100%; display:flex; justify-content:space-between; align-items:center; padding:8px 40px 0; flex-shrink:0;">
            <span class="time" id="statusBarTime" style="font-size:0.875rem; font-weight:700; color:#1e293b;">9:41</span>
            <div class="status-icons" style="display:flex; gap:6px; align-items:center;">
                <div class="battery" style="width:20px;height:10px;background:#cbd5e1;border-radius:2px;"></div>
                <div class="signal" style="width:12px;height:12px;background:#cbd5e1;border-radius:50%;"></div>
            </div>
        </div>

        <div class="login-screen" style="padding: 1rem 1.5rem 4rem 1.5rem; flex:1; display:flex; flex-direction:column; overflow-y:auto; height: 100%;">

            <div class="logo-container"
                style="flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; align-items: center;">
                <div class="logo-icon" style="width: 60px; height: 60px; font-size: 1.8rem; margin-bottom: 0.5rem;">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div style="text-align: center;">
                    <h1 class="app-name"
                        style="font-size: 1.8rem; margin-bottom: 0.2rem; color: #1e293b; background: none; -webkit-text-fill-color: #1e293b;">
                        เลือกฟีเจอร์</h1>
                    <p class="tagline" id="ageTagline" style="color: #64748b;">ปรับแต่ง CareFate ให้เข้ากับคุณ
                    </p>
                </div>
            </div>

            <div style="flex: 1; display: flex; flex-direction: column;">
                <p style="color: #475569; font-size: 0.9rem; margin-bottom: 0.5rem; font-weight: 500;">
                    สามารถเลือกได้มากกว่า 1 ข้อ (เลือกภายหลังได้)
                </p>

                <div id="feature-warning-banner" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); padding: 12px; border-radius: 16px; font-size: 0.85rem; color: #b91c1c; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease;">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>กรุณาเลือกฟีเจอร์อย่างน้อย 1 ฟีเจอร์เพื่อเสร็จสิ้นการตั้งค่า (จำเป็น)</span>
                </div>

                <div class="feature-grid" id="featureGrid">
                    <!-- Features will be injected here by JS -->
                </div>
            </div>

            <button id="saveFeaturesBtn" class="btn-primary" style="margin-top: 1.5rem; margin-bottom: 1.5rem;">
                เสร็จสิ้นการตั้งค่า <i class="fa-solid fa-check"></i>
            </button>
        </div>
        
        <!-- Bottom Bar (Home Indicator) -->
        <div class="home-indicator" style="position:absolute; bottom:0; left:0; width:100%; height:32px; display:flex; justify-content:center; align-items:center; z-index:30;">
            <div class="indicator-bar" style="width:130px; height:5px; background:#cbd5e1; border-radius:9999px;"></div>
        </div>
    </div>

    <div id="notification-area"></div>

    <script src="notifications.js?v=8"></script>
    <script src="register.js?v=16"></script>
    <script>
        // Real-time Status Bar Clock
        function updateStatusBarTime() {
            const timeElement = document.getElementById('statusBarTime');
            if (!timeElement) return;
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            minutes = minutes < 10 ? '0' + minutes : minutes;
            timeElement.textContent = `${hours}:${minutes}`;
        }

        // Inline script to apply theme on load (essential for consistency)
        document.addEventListener('DOMContentLoaded', async () => {
            const _supabase = window.supabase.createClient('https://rjszmmogkiblqojikcow.supabase.co', 'sb_publishable_RoboGAH-Nqm1dQi3ORqYUQ_StZ7uU4Y');

            try {
                const { data: { session } } = await _supabase.auth.getSession();
                if (session && session.user) {
                    const { user } = session;
                    const theme = user.user_metadata.theme || 'working'; // Default if none

                    // Apply theme class
                    document.body.className = ''; // Clear default
                    document.body.classList.add(`theme-${theme}`);
                }
            } catch (e) {
                console.warn("Theme load failed in feature-selection:", e);
            }
            
            // Status Bar Clock
            updateStatusBarTime();
            setInterval(updateStatusBarTime, 1000);
        });
    </script>
</body>

</html>
