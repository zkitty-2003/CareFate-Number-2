<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFate - Chat Assistant</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="ai-logic.js"></script>
    <style>
        /* Chat Specific Styles */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: var(--bg-color);
            /* Contrast text */
            border-bottom-right-radius: 4px;
        }

        /* Theme Adjustments for User Bubble */
        body.theme-youth .message.user {
            background: #f472b6;
            color: white;
        }

        body.theme-working .message.user {
            background: #3b82f6;
            color: white;
        }

        body.theme-elder .message.user {
            background: black;
            color: white;
            border: 1px solid white;
        }

        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--card-border);
        }

        .chat-input-area {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            outline: none;
            font-family: inherit;
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--text-muted);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--primary-color);
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        body.theme-youth .send-btn {
            background: #f472b6;
            color: white;
        }

        body.theme-working .send-btn {
            background: #3b82f6;
            color: white;
        }

        body.theme-elder .send-btn {
            background: white;
            color: black;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 1rem;
            margin-bottom: 0.5rem;
            font-style: italic;
            display: none;
        }
    </style>
</head>

<body class="theme-working">
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="app-container" style="display:flex; flex-direction:column; padding:0 !important; overflow:hidden;">
        <!-- Header -->
        <div style="padding: 1rem 1.5rem; display:flex; align-items:center; background:rgba(0,0,0,0.1);">
            <div
                style="width:40px; height:40px; background:white; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-right:1rem;">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" style="width:24px; height:24px;">
            </div>
            <div>
                <h1 style="font-size:1.1rem; margin:0; font-weight:600; color:var(--text-color);">ผู้ช่วย CareFate AI
                </h1>
                <div style="font-size:0.8rem; color:var(--text-muted); display:flex; align-items:center; gap:5px;">
                    <div style="width:8px; height:8px; background:#22c55e; border-radius:50%;"></div> ออนไลน์
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <!-- Welcome Message (JS will insert based on theme) -->
            </div>
            <div class="typing-indicator" id="typingIndicator">CareFate กำลังพิมพ์...</div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="พิมพ์ข้อความ..."
                onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>

        <!-- Bottom Nav -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item" onclick="location.href='history.html'"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="nav-item active"><i class="fa-solid fa-comment-dots"></i></div>
            <div class="nav-item" onclick="location.href='settings.html'"><i class="fa-solid fa-gear"></i></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rjszmmogkiblqojikcow.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RoboGAH-Nqm1dQi3ORqYUQ_StZ7uU4Y';
        let _supabase;
        let currentTheme = 'working'; // default

        // ─── AI PERSONAS ───
        const PERSONAS = {
            'youth': {
                name: 'พี่แคร์เฟต',
                tone: 'cheerful, energetic, uses emojis, casual slang',
                welcome: 'หวัดดีจ้า! 👋 วันนี้มีอะไรให้พี่ช่วยมั้ย? หรืออยากเม้าท์เรื่องสุขภาพก็จัดมาเลย! 💖✨',
                responses: [
                    'โอเคเลย! เดี๋ยวพี่จัดการให้แป๊บนึงน้า 😉',
                    'โห เยี่ยมไปเลย! สู้ๆ นะคนเก่ง 💪🔥',
                    'เรื่องนี้พี่ว่า... ลองพักผ่อนเยอะๆ ดื่มน้ำเปล่าบ่อยๆ ช่วยได้นะ 💧😴',
                    'เข้าใจเลยยย 🥺 อย่าเครียดน้า เธอยังมีพี่อยู่ตรงนี้เสมอ 💖',
                    'จัดไป! เดี๋ยวพี่เตือนให้อีกทีนะ ไม่ต้องห่วง! ⏰✨'
                ]
            },
            'working': {
                name: 'ผู้ช่วย CareFate',
                tone: 'professional, efficient, polite, encouraging',
                welcome: 'สวัสดีครับ/ค่ะ 🙏 มีเรื่องสุขภาพหรือการบันทึกข้อมูลให้ผมช่วยดูแลไหมครับ? พร้อมให้บริการเสมอครับ ✨',
                responses: [
                    'รับทราบครับ ผมจะบันทึกข้อมูลนี้ไว้ให้ทันที ✅',
                    'เป็นคำถามที่ดีครับ เบื้องต้นแนะนำให้ลองสังเกตอาการดูอีกสักระยะนะครับ 🧐',
                    'อย่าลืมหาเวลาพักผ่อนบ้างนะครับ การทำงานหนักอาจส่งผลต่อสุขภาพได้ 💼🍵',
                    'เรียบร้อยครับ ข้อมูลถูกอัปเดตแล้วครับผม 👍',
                    'หากมีอาการผิดปกติเพิ่มเติม แนะนำให้ปรึกษาแพทย์โดยตรงนะครับ 🏥'
                ]
            },
            'elder': {
                name: 'น้องแคร์เฟต',
                tone: 'respectful, slow-paced, warm, clear simple language',
                welcome: 'กราบสวัสดีครับคุณตา/คุณยาย 🙏 วันนี้รู้สึกสบายตัวดีไหมครับ? ให้หลานช่วยดูเรื่องยาหรือนัดหมอให้นะครับ 👵👴🌼',
                responses: [
                    'ได้เลยครับ เดี๋ยวหลานจดบันทึกให้นะครับ คุณยายไม่ต้องกังวลครับ 📝☺️',
                    'คุณตาค่อยๆ ทานยานะครับ ดื่มน้ำอุ่นตามเยอะๆ จะได้ชุ่มคอครับ 🍵💊',
                    'เก่งมากเลยครับ! รักษาสุขภาพแข็งแรงแบบนี้ ลูกหลานชื่นใจแย่เลย 🥰👏',
                    'ช่วงนี้อากาศเปลี่ยนแปลง ห่มผ้าหนาๆ นะครับ เดี๋ยวจะไม่สบาย 🧥🥶',
                    'ถ้ามีอาการเวียนหัว นั่งพักก่อนนะครับ อย่าเพิ่งลุกเดินเร็วนะครับ 🪑😟'
                ]
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.supabase) {
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }

            // Sync Theme & Set Persona
            const localTheme = localStorage.getItem('theme');
            if (localTheme) currentTheme = localTheme;

            try {
                if (_supabase) {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (user && user.user_metadata && user.user_metadata.theme) {
                        currentTheme = user.user_metadata.theme;
                    }
                }
            } catch (e) { }

            applyTheme(currentTheme);

            // Initial Welcome Message
            setTimeout(() => {
                addBotMessage(PERSONAS[currentTheme].welcome);
            }, 600);
        });

        function applyTheme(theme) {
            document.body.classList.remove('theme-youth', 'theme-working', 'theme-elder');
            document.body.classList.add(`theme-${theme}`);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // 1. Add User Message
            addUserMessage(text);
            input.value = '';

            // 2. Show Typing Indicator
            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'block';

            // 3. Get Health Context (RAG)
            const healthContext = await window.getAIHealthContext(_supabase, 3);

            // 4. Call Real API
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        theme: currentTheme,
                        history_context: healthContext
                    })
                });

                const data = await response.json();
                typing.style.display = 'none';

                if (data.status === 'success') {
                    addBotMessage(data.reply);
                } else {
                    addBotMessage('ขออภัยครับ ระบบขัดข้องชั่วคราว (' + (data.message || 'Unknown Error') + ')');
                }

            } catch (e) {
                console.error(e);
                typing.style.display = 'none';
                addBotMessage('ขออภัยครับ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
            }
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chatMessages');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Mock AI Logic - In real app, this would be an API call to OpenAI/Claude with system prompt
        function generateMockResponse(input) {
            const persona = PERSONAS[currentTheme];
            const lowerInput = input.toLowerCase();

            // Simple Keyword Matching
            if (lowerInput.includes('สวัสดี') || lowerInput.includes('hi') || lowerInput.includes('hello')) {
                if (currentTheme === 'youth') return 'ไฮจ้า! 👋 วันนี้สดใสจังเลยนะ!';
                if (currentTheme === 'elder') return 'สวัสดีครับคุณพี่ มีอะไรให้รับใช้ไหมครับ? 🙏';
                return 'สวัสดีครับ วันนี้ให้ผมช่วยเรื่องอะไรดีครับ?';
            }

            if (lowerInput.includes('ยา') || lowerInput.includes('med')) {
                if (currentTheme === 'youth') return 'อย่าลืมกินยาตรงเวลานะ จะได้หายไวๆ! 💊💨';
                if (currentTheme === 'elder') return 'ถึงเวลาทานยาหรือยังครับ? เดี๋ยวหลานช่วยดูตารางยาให้นะครับ 💊👵';
                return 'ระบบได้บันทึกประวัติการทานยาไว้เรียบร้อยแล้วครับ ต้องการดูประวัติไหมครับ?';
            }

            // Default random response from persona
            const responses = persona.responses;
            return responses[Math.floor(Math.random() * responses.length)];
        }
    </script>
</body>

</html>
