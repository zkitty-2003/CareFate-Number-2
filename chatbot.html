<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFate - Chat Assistant</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="ai-logic.js"></script>
    <style>
        /* Chat Specific Styles */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: var(--bg-color);
            /* Contrast text */
            border-bottom-right-radius: 4px;
        }

        /* Theme Adjustments for User Bubble */
        body.theme-youth .message.user {
            background: #f472b6;
            color: white;
        }

        body.theme-working .message.user {
            background: #3b82f6;
            color: white;
        }

        body.theme-elder .message.bot {
            background: #ffffff !important;
            color: #022c22 !important;
            /* Very dark green text */
            border: 3px solid #059669 !important;
            /* Thicker green border */
            font-size: 1.4rem !important;
            font-weight: 700 !important;
        }

        body.theme-elder .message.user {
            background: #059669 !important;
            /* Theme green bubble */
            color: #ffffff !important;
            /* White text for contrast */
            border: 2px solid #047857 !important;
            font-size: 1.4rem !important;
            font-weight: 700 !important;
        }

        .chat-input-area {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            outline: none;
            font-family: inherit;
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--text-muted);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: var(--primary-color);
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        body.theme-youth .send-btn {
            background: #f472b6;
            color: white;
        }

        body.theme-working .send-btn {
            background: #3b82f6;
            color: white;
        }

        body.theme-elder .send-btn {
            background: white;
            color: black;
        }

        .send-btn:active {
            transform: scale(0.9);
        }

        body.theme-elder .chat-input {
            background: #ffffff !important;
            color: #000000 !important;
            font-size: 1.2rem !important;
            font-weight: 600 !important;
            border: 2px solid #000000 !important;
        }

        body.theme-elder .chat-input::placeholder {
            color: #666666 !important;
        }

        body.theme-elder .typing-indicator {
            color: #000000 !important;
            font-weight: 700 !important;
            font-size: 1rem !important;
        }

        .typing-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 1rem;
            margin-bottom: 0.5rem;
            font-style: italic;
            display: none;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 100;
            /* Ensure header is above chat area */
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000000;
            /* Extremely high to be above header */
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            padding: 1.5rem;
            position: relative;
            color: var(--text-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 1rem;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .history-list-item {
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-list-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .history-timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .history-preview {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

            <div class="nav-item active" onclick="location.href='chatbot.html'"><i class="fa-solid fa-comment-dots"></i>
            </div>

                <button class="close-modal" onclick="closeHistory()">&times;</button>
            </div>
            <div class="modal-body" id="historyModalBody">
                <!-- History items will be loaded here -->

        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rjszmmogkiblqojikcow.supabase.co';

                    'ช่วงนี้อากาศเปลี่ยนแปลง ห่มผ้าหนาๆ นะครับ เดี๋ยวจะไม่สบาย 🧥🥶',
                    'ถ้ามีอาการเวียนหัว นั่งพักก่อนนะครับ อย่าเพิ่งลุกเดินเร็วนะครับ 🪑😟'

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.supabase) {
                _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }

            // Sync Theme & Set Persona
            const localTheme = localStorage.getItem('theme');
            if (localTheme) currentTheme = localTheme;

            try {
                if (_supabase) {
                    const { data: { user } } = await _supabase.auth.getUser();
                    if (user && user.user_metadata && user.user_metadata.theme) {
                        currentTheme = user.user_metadata.theme;
                    }
                }
            } catch (e) { }

            applyTheme(currentTheme);

            // Load Chat History from Supabase
            loadChatHistory();
        });

        async function loadChatHistory() {
            if (!_supabase) return;
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) {
                    addBotMessage(PERSONAS[currentTheme].welcome, false);
                    return;
                }

                const { data, error } = await _supabase
                    .from('chat_history')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: true })
                    .limit(50);

                if (error) throw error;

                const chatBox = document.getElementById('chatMessages');
                chatBox.innerHTML = ''; // Clear only if we have history

                if (!data || data.length === 0) {
                    addBotMessage(PERSONAS[currentTheme].welcome, true); // Save welcome message if new
                } else {
                    data.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.role}`;
                        div.innerText = msg.content;
                        chatBox.appendChild(div);
                    });
                    scrollToBottom();
                }
            } catch (err) {
                console.error("Error loading chat history:", err);
                addBotMessage(PERSONAS[currentTheme].welcome, false);
            }
        }

        async function saveChatMessage(role, content) {
            if (!_supabase) return;
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) return;

                await _supabase.from('chat_history').insert([
                    { user_id: user.id, role: role, content: content }
                ]);
            } catch (err) {
                console.error("Error saving chat message:", err);
            }
        }

        async function openChatHistoryModal() {

            const modal = document.getElementById('historyModal');
            const body = document.getElementById('historyModalBody');

            if (!modal || !body) {
                alert("Error: Modal elements not found!");
                return;
            }

            modal.style.display = 'flex';
            body.innerHTML = '<div style="text-align:center; padding:2rem; color:var(--text-color);"><i class="fa-solid fa-circle-notch fa-spin"></i> กำลังโหลด...</div>';

            try {
                if (!_supabase) {
                    body.innerHTML = '<p style="text-align:center; color:var(--text-muted);">ไม่พบการเชื่อมต่อฐานข้อมูล</p>';
                    return;
                }
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) {
                    body.innerHTML = '<p style="text-align:center; color:var(--text-muted);">กรุณาเข้าสู่ระบบเพื่อดูประวัติการคุย</p>';
                    return;
                }

                const { data, error } = await _supabase
                    .from('chat_history')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                if (!data || data.length === 0) {
                    body.innerHTML = '<p style="text-align:center; color:var(--text-muted);">ไม่มีประวัติการคุย</p>';
                } else {
                    let html = '';
                    data.forEach(msg => {
                        const date = new Date(msg.created_at).toLocaleString('th-TH', {
                            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });
                        const roleLabel = msg.role === 'user' ? 'คุณ' : 'CareFate';
                        const color = msg.role === 'user' ? 'var(--primary-color)' : '#22c55e';
                        html += `
                            <div class="history-list-item" onclick="closeHistory()">
                                <div class="history-timestamp" style="color:${color}; font-weight:600;">${date} | ${roleLabel}</div>
                                <div class="history-preview" style="color:var(--text-color);">${msg.content}</div>
                            </div>
                        `;
                    });
                    body.innerHTML = html;
                }
            } catch (err) {
                console.error(err);
                body.innerHTML = '<p style="color:red; text-align:center;">โหลดไม่สำเร็จ</p>';
            }
        }

        function startNewChat() {
            if (confirm('คุณต้องการเริ่มแชทใหม่ใช่ไหม? (ข้อความปัจจุบันจะถูกล้าง)')) {
                document.getElementById('chatMessages').innerHTML = '';
                addBotMessage(PERSONAS[currentTheme].welcome, false);
            }
        }

        function closeHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }

        function applyTheme(theme) {
            document.body.classList.remove('theme-youth', 'theme-working', 'theme-elder');
            document.body.classList.add(`theme-${theme}`);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            // 1. Add & Save User Message
            addUserMessage(text, true);
            input.value = '';

            // 2. Show Typing Indicator
            const typing = document.getElementById('typingIndicator');
            typing.style.display = 'block';

            // 3. Get Health Context (RAG)
            const healthContext = await window.getAIHealthContext(_supabase, 3);

            // 4. Call Real API
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        theme: currentTheme,
                        history_context: healthContext
                    })
                });

                const data = await response.json();
                typing.style.display = 'none';

                if (data.status === 'success') {
                    addBotMessage(data.reply, true);
                } else {
                    addBotMessage('ขออภัยครับ ระบบขัดข้องชั่วคราว (' + (data.message || 'Unknown Error') + ')', false);
                }

            } catch (e) {
                console.error(e);
                typing.style.display = 'none';
                addBotMessage('ขออภัยครับ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้', false);
            }
        }

        function addUserMessage(text, save = true) {
            const div = document.createElement('div');
            div.className = 'message user';
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            scrollToBottom();
            if (save) saveChatMessage('user', text);
        }

        function addBotMessage(text, save = true) {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.innerText = text;
            document.getElementById('chatMessages').appendChild(div);
            scrollToBottom();
            if (save) saveChatMessage('bot', text);
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chatMessages');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Mock AI Logic - In real app, this would be an API call to OpenAI/Claude with system prompt

            }

            if (lowerInput.includes('ยา') || lowerInput.includes('med')) {
                if (currentTheme === 'youth') return 'อย่าลืมกินยาตรงเวลานะ จะได้หายไวๆ! 💊💨';
                if (currentTheme === 'elder') return 'ถึงเวลาทานยาหรือยังครับ? เดี๋ยวหลานช่วยดูตารางยาให้นะครับ 💊👵';
                return 'ระบบได้บันทึกประวัติการทานยาไว้เรียบร้อยแล้วครับ ต้องการดูประวัติไหมครับ?';
            }

            // Default random response from persona
            const responses = persona.responses;
            return responses[Math.floor(Math.random() * responses.length)];
        }
    </script>
