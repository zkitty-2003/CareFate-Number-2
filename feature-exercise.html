<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFate - บันทึกการออกกำลังกาย</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=10">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* Exercise Specific Theme - Orange/Red Accents */
        :root {
            --exercise-primary: #f97316;
            --exercise-secondary: #fb923c;
        }

        .exercise-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .activity-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .activity-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .activity-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .activity-btn.active {
            background: rgba(249, 115, 22, 0.2);
            border-color: var(--exercise-primary);
            color: var(--exercise-primary);
            transform: translateY(-2px);
        }

        .activity-btn i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .intensity-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 0.3rem;
            margin-top: 1rem;
        }

        .intensity-opt {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .intensity-opt.active {
            background: var(--exercise-primary);
            color: white;
            font-weight: 600;
        }

        .kcal-display {
            font-size: 3rem;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, #f97316, #eab308);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: monospace;
            margin: 0.5rem 0;
        }

        /* Default Kcal Card Base Styles */
        .kcal-title {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .youth-only {
            display: none;
        }

        .kcal-unit {
            font-size: 1rem;
            color: var(--text-color);
        }

        .kcal-note {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        .working-elder-only {
            display: inline;
        }

        /* ==========================================
           THEME 1: YOUTH — Playful, Gradient, Bouncy
           ========================================== */
        body.theme-youth .exercise-card {
            background: rgba(255, 240, 245, 0.95);
            border: 2px solid #f0c6e0;
            box-shadow: 0 8px 25px rgba(244, 114, 182, 0.15);
            border-radius: 24px;
        }

        body.theme-youth .exercise-card .kcal-display {
            background: -webkit-linear-gradient(45deg, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Card Overrides for Youth */
        body.theme-youth .youth-only {
            display: inline;
        }

        body.theme-youth .working-elder-only {
            display: none;
        }

        body.theme-youth .exercise-card.kcal-hero-card {
            background: linear-gradient(to right, #ffa3b5, #ffdfd4, #ffd4ee) !important;
            border: none !important;
            box-shadow: 0 10px 30px rgba(255, 163, 181, 0.4) !important;
            padding: 1.5rem 1.5rem !important;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body.theme-youth .kcal-hero-card .kcal-title {
            color: #d81b60 !important;
            font-size: 0.9rem !important;
            font-weight: 700 !important;
            margin-bottom: 0.5rem !important;
        }

        body.theme-youth .kcal-hero-card .kcal-title span {
            color: inherit !important;
        }

        body.theme-youth .kcal-value-row {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        body.theme-youth .kcal-hero-card .kcal-display {
            background: none !important;
            -webkit-text-fill-color: #ffffff !important;
            color: #ffffff !important;
            font-size: 3rem !important;
            font-weight: 800 !important;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.15) !important;
            margin: 0 !important;
            line-height: 1 !important;
        }

        body.theme-youth .kcal-hero-card .kcal-unit {
            color: #ffffff !important;
            font-size: 1.2rem !important;
            font-weight: 700 !important;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1) !important;
        }

        body.theme-youth .kcal-hero-card .kcal-note {
            background: rgba(255, 255, 255, 0.4) !important;
            padding: 0.3rem 0.8rem !important;
            border-radius: 25px !important;
            color: #d81b60 !important;
            font-size: 0.7rem !important;
            font-weight: 600 !important;
            margin-top: 0 !important;
            opacity: 1 !important;
        }

        body.theme-youth .activity-btn {
            background: rgba(255, 245, 250, 0.9);
            border: 2px solid #f3e4ef;
            border-radius: 20px;
            color: #5d5b6a;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.theme-youth .activity-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(244, 114, 182, 0.2);
        }

        body.theme-youth .activity-btn.active {
            background: linear-gradient(135deg, rgba(244, 114, 182, 0.15), rgba(167, 139, 250, 0.15));
            border-color: #f472b6;
            color: #be185d !important;
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(244, 114, 182, 0.25);
            font-weight: 700 !important;
        }

        body.theme-youth .activity-btn.active span {
            color: #be185d !important;
            font-weight: 700 !important;
        }

        body.theme-youth .activity-btn i {
            color: #a78bfa;
        }

        body.theme-youth .activity-btn.active i {
            color: #f472b6;
        }

        body.theme-youth .intensity-selector {
            background: rgba(244, 114, 182, 0.1);
            border-radius: 16px;
        }

        body.theme-youth .intensity-opt {
            color: #8b86a3;
            border-radius: 14px;
        }

        body.theme-youth .intensity-opt.active {
            background: rgba(244, 114, 182, 0.1) !important;
            border-color: #f472b6 !important;
            color: #be185d !important;
            font-weight: 700 !important;
            box-shadow: 0 8px 20px rgba(244, 114, 182, 0.15) !important;
        }

        body.theme-youth .intensity-opt.active span {
            color: #be185d !important;
            font-weight: 700 !important;
        }

        /* Adjust labels and titles directly since we removed generic overrides */
        body.theme-youth label {
            color: #5d5b6a !important;
            font-weight: 600 !important;
        }

        body.theme-youth .youth-title-bold {
            color: #3d3b4a !important;
            font-weight: 800 !important;
        }

        /* Activity Grid - Youth Overrides */
        body.theme-youth .text-emoji {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        body.theme-youth .activity-grid {
            gap: 1rem;
        }

        body.theme-youth .activity-btn {
            background: #ffffff;
            border: 2px solid #f6eaf3;
            border-radius: 20px;
            padding: 1.2rem 0.5rem;
            color: #8b86a3;
            font-weight: 500;
        }

        body.theme-youth .activity-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.03);
        }

        body.theme-youth .activity-btn.active {
            background: linear-gradient(135deg, rgba(255, 240, 230, 0.5), transparent) !important;
            border-color: #ff9f43 !important;
            color: #5d5b6a !important;
            box-shadow: 0 8px 20px rgba(255, 159, 67, 0.2) !important;
            transform: translateY(-3px) scale(1.02);
        }

        /* Duration Slider - Youth Overrides */
        body.theme-youth .duration-title {
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }

        body.theme-youth .youth-duration-pill-inline {
            background: #ffebd6;
            color: #ff9f43;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        body.theme-youth #durationSlider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            background: #ffd1dc;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 1px 4px rgba(255, 107, 107, 0.3);
        }

        body.theme-youth #durationSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
            border: 3px solid #fff;
        }

        body.theme-youth .youth-slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #5d5b6a;
            font-weight: 600;
            margin-top: 0.8rem;
        }

        /* Intensity Selector - Youth Overrides */
        body.theme-youth .intensity-selector {
            background: transparent !important;
            gap: 0.8rem;
            display: flex;
        }

        body.theme-youth .intensity-opt {
            background: #ffffff;
            border: 2px solid #f6eaf3;
            border-radius: 20px;
            color: #8b86a3;
            padding: 0.8rem 0.5rem;
            font-size: 0.85rem;
        }


        body.theme-youth #saveBtn {
            background: linear-gradient(135deg, #ff6b6b, #ff8da1) !important;
            border-radius: 24px !important;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.35) !important;
            color: #ffffff !important;
            font-weight: 700 !important;
        }

        body.theme-youth #saveBtn span {
            color: #ffffff !important;
            font-weight: 700 !important;
        }

        body.theme-youth textarea {
            background: rgba(255, 245, 250, 0.9) !important;
            border-color: #f3e4ef !important;
            color: #5d5b6a !important;
        }

        body.theme-youth textarea::placeholder {
            color: #8b86a3 !important;
        }

        /* ===== GLOBAL THEME REDESIGN (Match Dashboard Frame) ===== */
        body.theme-youth,
        body.theme-working,
        body.theme-elder {
            background: #d1d5db !important; /* Gray outer background */
            position: relative;
        }

        /* App Container / Phone Frame */
        body.theme-youth .app-container,
        body.theme-working .app-container,
        body.theme-elder .app-container {
            border: 10px solid #ffffff !important;
            border-radius: 64px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            backdrop-filter: none !important;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        body.theme-youth .app-container { background: #FAF9FF !important; }
        body.theme-working .app-container { background: #f0f9ff !important; }
        body.theme-elder .app-container { background: #fff7ed !important; }

        /* Aura Backgrounds (Hidden for pure white background) */
        body.theme-youth .app-container::before,
        body.theme-youth .app-container::after {
            display: none !important;
        }

        /* Bottom Nav (Flush to bottom) */
        body.theme-youth .bottom-nav,
        body.theme-working .bottom-nav,
        body.theme-elder .bottom-nav {
            position: absolute !important;
            bottom: 0; left: 0; right: 0; height: 86px; border-radius: 0;
            width: 100% !important; padding-bottom: 15px; /* space for home indicator */
            background: rgba(255, 255, 255, 0.98) !important; 
            border: none !important; border-top: 2px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: none !important;
            z-index: 40;
            display: flex; justify-content: space-around; align-items: center;
        }

        /* Set theme colors for bottom nav */
        body.theme-youth { --nav-color: #a855f7; }
        body.theme-working { --nav-color: #4f46e5; }
        body.theme-elder { --nav-color: #10b981; }

        body.theme-youth .nav-item,
        body.theme-working .nav-item,
        body.theme-elder .nav-item { 
            width: 60px; height: 60px; border-radius: 50%; background: transparent !important;
            position: relative; display: flex; align-items: center; justify-content: center;
            color: #9ca3af; transition: all 0.3s; z-index: 2;
        }
        body.theme-youth .nav-item i,
        body.theme-working .nav-item i,
        body.theme-elder .nav-item i { font-size: 1.4rem; z-index: 2; transition: all 0.3s; }
        
        body.theme-youth .nav-item.active i,
        body.theme-elder .nav-item.active i { color: var(--nav-color) !important; transform: scale(1.1); }
        
        /* Glowing effect for active icon */
        body.theme-youth .nav-item::before,
        body.theme-elder .nav-item::before {
            content: ''; position: absolute; width: 36px; height: 36px; border-radius: 50%;
            background: var(--nav-color); filter: blur(14px); opacity: 0; transition: opacity 0.3s; z-index: 1;
        }
        body.theme-youth .nav-item.active::before,
        body.theme-elder .nav-item.active::before { opacity: 0.35; }

        /* ===== WORKING THEME NAV OVERRIDES ===== */
        body.theme-working .nav-item { width: 55px; height: 55px; }
        body.theme-working .nav-item.active { background: rgba(16, 185, 129, 0.12) !important; border-radius: 20px !important; }
        body.theme-working .nav-item i { color: #94a3b8 !important; opacity: 1 !important; }
        body.theme-working .nav-item.active i { color: #0891b2 !important; transform: scale(1.05); }
        body.theme-working .nav-item::before { display: none !important; }

        body.theme-working .exercise-card {
            background: #ffffff;
            border: none;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            margin-bottom: 1rem;
        }

        body.theme-working .exercise-card.kcal-hero-card {
            padding: 1.8rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            border-left: 10px solid #6366f1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            background: #ffffff;
            margin-bottom: 1.5rem;
        }

        body.theme-working .exercise-card.kcal-hero-card::before {
            display: none;
        }

        body.theme-working .kcal-title {
            color: #4f46e5;
            font-weight: 800;
            font-size: 1.05rem;
            margin-bottom: 1rem;
        }

        body.theme-working .kcal-value-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        body.theme-working .kcal-display {
            background: #6366f1 !important;
            -webkit-text-fill-color: #ffffff !important;
            color: #ffffff !important;
            min-width: 55px;
            height: 55px;
            padding: 0 15px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            box-sizing: border-box;
        }

        body.theme-working .kcal-unit {
            color: #1f2937;
            font-weight: 900;
            font-size: 1.15rem;
        }

        body.theme-working .kcal-note {
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0;
        }

        body.theme-working .activity-grid {
            gap: 1rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        body.theme-working .activity-btn {
            background: #ffffff;
            border: 1px solid #f3f4f6;
            border-radius: 24px;
            padding: 1.2rem 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s;
        }

        body.theme-working .activity-btn i {
            background: #f9fafb;
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            font-size: 1.8rem !important;
            margin-bottom: 0 !important;
            transition: all 0.2s;
        }

        body.theme-working .activity-btn span {
            font-size: 0.9rem;
            font-weight: 800;
            color: #1f2937;
        }

        body.theme-working .activity-btn:hover {
            border-color: #c7d2fe;
        }

        body.theme-working .activity-btn.active {
            border: 1px solid #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        body.theme-working .activity-btn.active i {
            background: #eef2ff;
            color: #6366f1;
        }

        body.theme-working .activity-btn.active span {
            color: #4f46e5;
        }

        body.theme-working .intensity-selector {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 0.4rem;
            display: flex;
            gap: 0.2rem;
        }

        body.theme-working .intensity-opt {
            color: #6b7280;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 800;
            padding: 0.8rem;
            flex: 1;
            text-align: center;
            transition: all 0.2s;
        }

        body.theme-working .intensity-opt.active {
            background: #6366f1;
            color: white;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
        }

        body.theme-working #saveBtn {
            background: #6366f1 !important;
            border-radius: 20px !important;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3) !important;
            font-weight: 700 !important;
            color: white !important;
            padding: 1.2rem !important;
            border: none !important;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
        }

        body.theme-working textarea {
            background: #f9fafb !important;
            border: 1px solid #e5e7eb !important;
            color: #1f2937 !important;
            border-radius: 16px !important;
            padding: 1rem !important;
        }
        
        body.theme-working input[type="range"] {
            accent-color: #f97316;
            height: 6px;
        }

        body.theme-working .back-btn {
            background: #ffffff !important;
            border-radius: 50% !important;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* ==========================================
           THEME 3: ELDER — High Contrast, Large, Simple
           ========================================== */
        body.theme-elder .exercise-card {
            background: #ffffff;
            border: 2px solid #059669;
            border-radius: 16px;
            box-shadow: none;
            padding: 1.8rem;
        }

        body.theme-elder .exercise-card .kcal-display {
            font-size: 4rem;
            background: none;
            -webkit-text-fill-color: #059669;
            color: #059669;
        }

        body.theme-elder .activity-btn {
            background: #ffffff;
            border: 2px solid #d1d5db;
            border-radius: 16px;
            padding: 2rem 1rem;
            color: #111827;
        }

        body.theme-elder .activity-btn i {
            font-size: 2.5rem;
            color: #111827;
        }

        body.theme-elder .activity-btn span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        body.theme-elder .activity-btn:hover {
            border-color: #059669;
        }

        body.theme-elder .activity-btn.active {
            background: #dcfce7;
            border-color: #059669;
            color: #065f46;
            transform: none;
            box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.2);
        }

        body.theme-elder .activity-btn.active i {
            color: #059669;
        }

        body.theme-elder .intensity-selector {
            background: #f3f4f6;
            border-radius: 12px;
            padding: 0.4rem;
        }

        body.theme-elder .intensity-opt {
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #374151;
            border-radius: 10px;
        }

        body.theme-elder .intensity-opt.active {
            background: #059669;
            color: white;
        }

        body.theme-elder label {
            font-size: 1.15rem !important;
            font-weight: 700 !important;
            color: #111827 !important;
        }

        body.theme-elder #durationValue {
            font-size: 2rem !important;
        }

        body.theme-elder #saveBtn {
            background: #059669 !important;
            border-radius: 16px !important;
            font-size: 1.2rem !important;
            padding: 1.2rem !important;
            box-shadow: none;
            border: 2px solid #047857 !important;
        }

        body.theme-elder textarea {
            background: #ffffff !important;
            border: 2px solid #d1d5db !important;
            color: #111827 !important;
            font-size: 1.1rem !important;
            border-radius: 12px !important;
        }
    </style>
</head>

<body class="theme-working page-feature">
    <div class="background-shapes">
        <!-- Energetic Shapes -->
        <div class="shape shape-1" style="background: radial-gradient(circle, #c2410c 0%, transparent 60%);"></div>
        <div class="shape shape-2" style="background: radial-gradient(circle, #ea580c 0%, transparent 60%);"></div>
    </div>

    <div class="app-container" style="display:flex; flex-direction:column; padding:0 !important; overflow:hidden; position:relative;">
        <!-- Status Bar -->
        <div class="status-bar" style="position:relative; z-index:20; height:56px; width:100%; display:flex; justify-content:space-between; align-items:center; padding:8px 40px 0; flex-shrink:0;">
            <span class="time" id="statusBarTime" style="font-size:0.875rem; font-weight:700; color:#1e293b;">9:41</span>
            <div class="status-icons" style="display:flex; gap:6px; align-items:center;">
                <div class="battery" style="width:20px;height:10px;background:#cbd5e1;border-radius:2px;"></div>
                <div class="signal" style="width:12px;height:12px;background:#cbd5e1;border-radius:50%;"></div>
            </div>
        </div>

        <!-- Pink aura layer 3 (Youth Only) -->
        <div class="aura-pink" style="display:none; position:absolute; bottom:-10%; left:10%; width:450px; height:450px; background:rgba(251,207,232,0.3); filter:blur(120px); border-radius:50%; z-index:0; pointer-events:none;"></div>

        <!-- Header -->
        <div style="padding: 1.5rem 1.5rem 0.5rem; display:flex; align-items:center; position:relative; z-index:10;">
            <button onclick="location.href='dashboard.html'" class="back-btn"
                style="background:none; border:none; padding:0; cursor:pointer; color:var(--text-color);">
                <i class="fa-solid fa-arrow-left" style="font-size:1.2rem;"></i>
            </button>
            <h1
                style="flex:1; text-align:center; font-size:1.4rem; margin:0; font-weight:800; color:var(--text-color);">
                ออกกำลังกาย<span class="youth-only"> 💦</span>
            </h1>
            <div style="width:44px;"></div>
        </div>

        <div class="scrollable-content"
            style="flex:1; overflow-y:auto; padding: 0 1.5rem 7rem; display:flex; flex-direction:column;">

            <!-- Kcal Calculation Display -->
            <div class="exercise-card kcal-hero-card">
                <div class="kcal-title">เผาผลาญพลังงานไป<span class="youth-only">แล้ว</span></div>
                <div class="kcal-value-row">
                    <div id="kcalDisplay" class="kcal-display">0</div>
                    <div class="kcal-unit">Kcal<span class="working-elder-only"> (กิโลแคลอรี่)</span></div>
                </div>
                <div class="kcal-note">
                    <span class="working-elder-only">(</span>คำนวณจาก: กิจกรรม x ความหนัก x เวลา<span
                        class="working-elder-only">)</span>
                </div>
            </div>

            <!-- Activity Selection -->
            <label style="display:flex; align-items:center; color:var(--text-color); margin-left:0.5rem; margin-top:1rem; font-weight:800;">
                <span class="working-elder-only" style="font-size:1.5rem; margin-right:0.5rem;">🏃</span>
                <span class="youth-only" style="margin-right:0.5rem;">🏃</span>
                <span class="working-elder-only" style="font-size:1.1rem; color:#1f2937;">ประเภทกิจกรรม</span>
                <span class="youth-only youth-title-bold"
                    style="color:#5d5b6a; font-weight:700;">เลือกกิจกรรมเลย!</span>
            </label>
            <div class="activity-grid">
                <div class="activity-btn" onclick="selectActivity(this, 'วิ่ง / เดินเร็ว', 10)">
                    <i class="fa-solid fa-heart-pulse working-elder-only"></i><span
                        class="youth-only text-emoji">🏃</span>
                    <span>วิ่ง / เดินเร็ว</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'ฟุตบอล / กีฬาทีม', 9)">
                    <i class="fa-solid fa-suitcase working-elder-only"></i><span class="youth-only text-emoji">⚽</span>
                    <span>ฟุตบอล / กีฬาทีม</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'เต้น', 7)">
                    <i class="fa-solid fa-music working-elder-only"></i><span class="youth-only text-emoji">🎵</span>
                    <span>เต้น</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'ว่ายน้ำ', 8)">
                    <i class="fa-solid fa-droplet working-elder-only"></i><span
                        class="youth-only text-emoji">🏊</span>
                    <span>ว่ายน้ำ</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'ปั่นจักรยาน', 7)">
                    <i class="fa-solid fa-bicycle working-elder-only"></i><span
                        class="youth-only text-emoji">🚴</span>
                    <span>ปั่นจักรยาน</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'ยิม / เวท', 6)">
                    <i class="fa-solid fa-dumbbell working-elder-only"></i><span
                        class="youth-only text-emoji">🏋️</span>
                    <span>ยิม / เวท</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'แบดมินตัน', 7)">
                    <i class="fa-solid fa-table-tennis-paddle-ball working-elder-only"></i><span
                        class="youth-only text-emoji">🏸</span>
                    <span>แบดมินตัน</span>
                </div>
                <div class="activity-btn" onclick="selectActivity(this, 'โยคะ / ยืดเหยียด', 3)">
                    <i class="fa-solid fa-spa working-elder-only"></i><span class="youth-only text-emoji">🧘</span>
                    <span>โยคะ / ยืดเหยียด</span>
                </div>
            </div>

            <!-- Duration -->
            <div class="exercise-card duration-card" style="margin-top:0.5rem; padding:1.5rem;">
                <div class="duration-section">
                    <label style="display:block; text-align:left; font-weight:800; color:#1f2937; margin-bottom:1.5rem;"
                        class="duration-title">
                        ระยะเวลา (นาที)
                        <span class="youth-only youth-duration-pill-inline" id="durationValueYouth">30</span>
                    </label>
                    <div style="display:flex; align-items:center; gap:1.5rem;" class="duration-slider-container">
                        <input type="range" id="durationSlider" min="5" max="120" value="30" step="5"
                            style="flex:1;" oninput="updateDuration(this.value)">
                        <span id="durationValue"
                            style="font-size:2rem; font-weight:900; color:#111827; min-width:45px; text-align:right;"
                            class="working-elder-only">30</span>
                    </div>
                    <div class="youth-only youth-slider-labels">
                        <span>5 นาที</span>
                        <span>2 ชั่วโมง</span>
                    </div>
                </div>
            </div>

            <!-- Intensity -->
            <div class="exercise-card intensity-card" style="margin-top:0.5rem; padding:1.5rem;">
                <div style="text-align:left;">
                    <label style="font-weight:800; color:#1f2937; display:block; margin-bottom:1rem;" class="intensity-title">ความเข้มข้น (Intensity)<span
                            class="youth-only"> 🔥</span></label>
                    <div class="intensity-selector">
                        <div class="intensity-opt active" onclick="setIntensity(this, 0.8)">เบา<span
                                class="youth-only">ชิลๆ 😅</span></div>
                        <div class="intensity-opt" onclick="setIntensity(this, 1.0)">ปานกลาง<span class="youth-only">
                                🥵</span></div>
                        <div class="intensity-opt" onclick="setIntensity(this, 1.2)">หนัก<span class="youth-only">หน่วง
                                🤬</span></div>
                    </div>
                </div>
            </div>

            <!-- Note -->
            <div class="exercise-card note-card" style="margin-top:0.5rem; padding:1.5rem;">
                <div style="text-align:left;">
                    <label style="font-weight:800; color:#1f2937; margin-bottom:1rem; display:block;"
                        class="note-title">บันทึกเพิ่มเติม<span class="youth-only"> (ถ้ามี) 📝</span></label>
                    <textarea id="exerciseNote" rows="2" placeholder="เช่น วิ่งรอบหมู่บ้าน, ยกเวทแขน..."
                        style="width:100%; box-sizing:border-box; outline:none; resize:none; font-family:var(--font-family); font-size:0.95rem;"></textarea>
                </div>
            </div>

            <!-- Save Button -->
            <button class="btn-primary" id="saveBtn" onclick="saveExerciseLog()"
                style="margin-top:0.5rem; margin-bottom:1.5rem;">
                <span class="working-elder-only"><i class="fa-solid fa-fire" style="margin-right:0.5rem;"></i>บันทึกการเผาผลาญ</span>
                <span class="youth-only">🔥 บันทึกการเผาผลาญ!</span>
            </button>

        </div>

        <!-- Bottom Nav (Standard) -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item active" onclick="location.href='history.html'"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="nav-item" onclick="location.href='chatbot.html'"><i class="fa-solid fa-comment"></i></div>
            <div class="nav-item" onclick="location.href='settings.html'"><i class="fa-solid fa-gear"></i></div>
        </div>

        <!-- Bottom Bar (Home Indicator) -->
        <div class="home-indicator" style="position:absolute; bottom:0; width:100%; height:32px; display:flex; justify-content:center; align-items:center; z-index:30;">
            <div class="indicator-bar" style="width:130px; height:5px; background:#cbd5e1; border-radius:9999px;"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rjszmmogkiblqojikcow.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RoboGAH-Nqm1dQi3ORqYUQ_StZ7uU4Y';
        let _supabase;

        let currentMet = 0; // Metabolic Equivalent of Task
        let currentIntensityMultiplier = 0.8; // Default Low
        let currentDuration = 30;
        let selectedActivityName = '';

        document.addEventListener('DOMContentLoaded', async () => {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Apply Theme
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user && user.user_metadata && user.user_metadata.theme) {
                    document.body.classList.remove('theme-youth', 'theme-working', 'theme-elder');
                    document.body.classList.add(`theme-${user.user_metadata.theme}`);
                }
            } catch (e) { }

            updateSliderBackground();
        });

        function updateSliderBackground() {
            const slider = document.getElementById('durationSlider');
            if (document.body.classList.contains('theme-youth')) {
                const min = parseInt(slider.min) || 5;
                const max = parseInt(slider.max) || 120;
                const val = parseInt(slider.value) || 30;
                const percent = ((val - min) / (max - min)) * 100;
                slider.style.background = `linear-gradient(to right, #ff8da1 0%, #ff8da1 ${percent}%, #ffe4e6 ${percent}%, #ffe4e6 100%)`;
            } else {
                slider.style.background = '';
            }
        }

        function updateDuration(val) {
            currentDuration = parseInt(val);
            document.getElementById('durationValue').innerText = currentDuration;

            const youthPill = document.getElementById('durationValueYouth');
            if (youthPill) {
                youthPill.innerText = currentDuration;
            }

            calculateCalories();
            updateSliderBackground();
        }

        function selectActivity(el, type, baseMet) {
            document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            currentMet = baseMet;
            selectedActivityName = type;
            calculateCalories();
        }

        function setIntensity(el, multiplier) {
            document.querySelectorAll('.intensity-opt').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            currentIntensityMultiplier = multiplier;
            calculateCalories();
        }

        function calculateCalories() {
            if (!currentMet) {
                document.getElementById('kcalDisplay').innerText = '0';
                return;
            }

            let kcalPerMin = 5;
            if (currentMet >= 8) kcalPerMin = 8;
            if (currentMet < 5) kcalPerMin = 3;

            kcalPerMin = kcalPerMin * (currentIntensityMultiplier / 0.8);

            const total = Math.round(kcalPerMin * currentDuration);
            document.getElementById('kcalDisplay').innerText = total;

            // Pulse animation
            const disp = document.getElementById('kcalDisplay');
            disp.style.transform = 'scale(1.2)';
            setTimeout(() => disp.style.transform = 'scale(1)', 200);
        }

        async function saveExerciseLog() {
            if (!selectedActivityName) {
                alert('กรุณาเลือกประเภทกิจกรรม');
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังบันทึก...';
            btn.disabled = true;

            const kcal = document.getElementById('kcalDisplay').innerText;
            const note = document.getElementById('exerciseNote').value;

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user) {
                    const intensityText = currentIntensityMultiplier === 0.8 ? 'เบา' : currentIntensityMultiplier === 1.0 ? 'ปานกลาง' : 'หนัก';
                    const noteText = `${currentDuration} นาที | ${kcal} kcal (${intensityText})${note ? ' — ' + note : ''}`;
                    const logData = {
                        user_id: user.id,
                        type: 'exercise',
                        detail: selectedActivityName,
                        note: noteText,
                        calories: parseInt(kcal),
                        created_at: new Date().toISOString()
                    };

                    // Try DB
                    try {
                        const { error: dbErr } = await _supabase.from('exercise_logs').insert([logData]);
                        if (dbErr) {
                            alert("Supabase Error: " + dbErr.message);
                            console.warn("DB Save failed:", dbErr.message);
                        }
                    } catch (err) {
                        alert("Fetch Error: " + err.message);
                        console.warn("DB Save failed", err);
                    }

                    // Local Storage
                    const exLogs = JSON.parse(localStorage.getItem('exercise_logs') || '[]');
                    exLogs.push(logData);
                    localStorage.setItem('exercise_logs', JSON.stringify(exLogs));

                    // Invalidate AI Health summary cache
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && key.startsWith('healthsummary_')) {
                            localStorage.removeItem(key);
                        }
                    }

                    alert(`บันทึกการออกกำลังกายเรียบร้อย! เผาผลาญ ${kcal} kcal`);
                    location.href = 'history.html';
                }
            } catch (e) {
                console.error(e);
                alert('เกิดข้อผิดพลาดในการบันทึก');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-fire"></i> บันทึกการเผาผลาญ';
            }
        }

        // Real-time Status Bar Clock
        function updateStatusBarTime() {
            const timeElement = document.getElementById('statusBarTime');
            if (!timeElement) return;
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            minutes = minutes < 10 ? '0' + minutes : minutes;
            timeElement.textContent = `${hours}:${minutes}`;
        }
        updateStatusBarTime();
        setInterval(updateStatusBarTime, 1000);

        // Show pink aura only for youth (Disabled for white background)
        document.addEventListener('DOMContentLoaded', () => {
            if (document.body.classList.contains('theme-youth')) {
                const pinkAura = document.querySelector('.aura-pink');
                if(pinkAura) pinkAura.style.display = 'none'; // Keep it hidden for pure white bg
            }
        });
    </script>
</body>

</html>
