<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เลือกธีม - CareFate</title>
    <link rel="stylesheet" href="style.css?v=16">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>

<body>
    <div class="app-container" style="background-color: #FAF9FF;">
        <!-- Background Aura -->
        <div class="aura purple-aura" style="width: 400px; height: 400px; top: -5%; right: -10%; opacity: 0.3; filter: blur(100px);"></div>
        <div class="aura blue-aura" style="width: 350px; height: 350px; top: 20%; left: -15%; opacity: 0.4; filter: blur(90px);"></div>
        <div class="aura pink-aura" style="width: 450px; height: 450px; bottom: -10%; left: 10%; opacity: 0.3; filter: blur(120px);"></div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time" id="statusBarTime">9:41</span>
            <div class="status-icons">
                <div class="battery"></div>
                <div class="signal"></div>
            </div>
        </div>

        <main class="login-screen bright-theme" style="justify-content: flex-start; padding-top: 1rem; animation: slideInFromBottom 0.7s ease-out forwards;">
            <div class="login-header" style="text-align: center; margin-bottom: 2.5rem;">
                <h2 class="app-name" style="font-size: 1.875rem; color: #0f172a; margin-bottom: 0.5rem; letter-spacing: -0.025em;">เลือกสไตล์ของคุณ</h2>
                <p class="tagline" id="ageTagline" style="color: #1e293b; font-size: 0.875rem; font-weight: 600; justify-content: center;">แนะนำธีมตามช่วงอายุ (อายุ 25 ปี):</p>
            </div>

            <div class="theme-selection-container" id="themeContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                <!-- Theme Cards will be injected here by JS -->
            </div>

            <div style="margin-top: 2.5rem; margin-bottom: 1.5rem;">
                <button id="completeRegistration" class="btn-primary" style="width: 100%; background: #050810; color: white; padding: 1.25rem; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);">
                    <span style="font-weight: 600; font-size: 1.125rem;">ยืนยันการเลือกธีม</span>
                    <i class="fa-solid fa-check" style="font-size: 1.25rem;"></i>
                </button>
            </div>
        </main>

        <!-- Bottom Bar -->
        <div class="home-indicator">
            <div class="indicator-bar" style="background-color: #94a3b8; width: 144px;"></div>
        </div>
    </div>

    <style>
        @keyframes slideInFromBottom {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .theme-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .theme-card.recommended {
            border-color: #a855f7;
            background: rgba(255, 255, 255, 0.8);
        }

        .theme-card.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
            transform: scale(1.02);
        }

        .theme-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #a855f7;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .theme-youth .theme-icon {
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
        }

        .theme-working .theme-icon {
            background: linear-gradient(135deg, #1e40af 0%, #10b981 100%);
            color: #fff;
        }

        .theme-elder .theme-icon {
            background: linear-gradient(135deg, #f97316 0%, #fbbf24 100%);
            color: #431407;
        }
    </style>

    <script src="notifications.js?v=8"></script>
    <script src="register.js?v=16"></script>
</body>

</html>
