<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFate - ประวัติสุขภาพ</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
            margin-bottom: 1rem;
        }

        .filter-chip {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: var(--text-color);
        }

        .history-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--card-border);
        }

        .timeline-date {
            font-size: 0.8rem;
            color: #a855f7;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .report-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 5rem;
        }

        /* Tab Styles */
        .history-tabs {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 4px;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        /* Chat Specific Styles for History View */
        .chat-bubble-container {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 4px;
            position: relative;
        }

        .chat-bubble.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-bubble.bot {
            align-self: flex-start;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--card-border);
            border-bottom-left-radius: 4px;
        }

        .chat-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: 0 5px 8px;
        }

        .chat-time.user {
            text-align: right;
        }

        .chat-time.bot {
            text-align: left;
        }
    </style>
</head>

<body class="theme-working page-feature">
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="app-container" style="display:flex; flex-direction:column; padding:0 !important; overflow:hidden;">
        <!-- Header Container (with padding) -->
        <div style="padding: 1.5rem 1.5rem 0.5rem; display:flex; align-items:center;">
            <button onclick="location.href='dashboard.html'"
                style="background:none; border:none; padding:0.5rem; cursor:pointer; color:var(--text-color);">
                <i class="fa-solid fa-arrow-left" style="font-size:1.5rem;"></i>
            </button>
            <h1
                style="flex:1; text-align:center; font-size:1.2rem; margin:0; font-weight:600; color:var(--text-color);">
                ประวัติสุขภาพ</h1>
            <div style="width:35px;"></div>
        </div>

        <div style="padding: 0 1.5rem 2rem; flex:1; overflow-y:auto; width:100%;">

            <!-- Tab Switcher -->
            <div class="history-tabs">
                <button class="tab-btn active" onclick="switchView('health')">
                    <i class="fa-solid fa-notes-medical"></i> บันทึกสุขภาพ
                </button>
                <button class="tab-btn" onclick="switchView('chat')">
                    <i class="fa-solid fa-message"></i> ประวัติการแชท
                </button>
            </div>

            <!-- Filters (Categories) - Only visible for health logs -->
            <div id="healthFilters" class="filter-bar" style="overflow:visible; gap:10px; align-items:center;">
                <span style="font-size:0.9rem; color:var(--text-color); white-space:nowrap;">แสดง:</span>

                <!-- Time Filter -->
                <select id="timeFilterSelect" onchange="setTimeFilter(this.value)" style="
                    background: var(--card-bg);
                    border: 1px solid var(--card-border);
                    color: var(--text-color);
                    padding: 0.5rem 1rem;
                    border-radius: 12px;
                    font-size: 0.9rem;
                    width: auto;
                    min-width: 120px;
                    outline: none;
                    cursor: pointer;
                    font-family: 'Outfit', sans-serif;
                ">
                    <option value="all">ทั้งหมด</option>
                    <option value="week">สัปดาห์นี้</option>
                    <option value="month">เดือนนี้</option>
                </select>

                <!-- Category Filter -->
                <select id="filterSelect" onchange="setFilter(this.value)" style="
                    background: var(--card-bg);
                    border: 1px solid var(--card-border);
                    color: var(--text-color);
                    padding: 0.5rem 1rem;
                    border-radius: 12px;
                    font-size: 0.9rem;
                    width: 100%;
                    outline: none;
                    cursor: pointer;
                    font-family: 'Outfit', sans-serif;
                ">
                    <option value="all">ทุกหมวดหมู่</option>
                    <option value="excretion">การขับถ่าย</option>
                    <option value="medication">ทานยา</option>
                    <option value="sleep">การนอน</option>
                    <option value="goal">เป้าหมาย</option>
                    <option value="period">รอบเดือน</option>
                    <option value="food">มื้ออาหาร</option>
                    <option value="vehicle">การดูแลรถ</option>
                    <option value="appointment">นัดหมายแพทย์</option>
                </select>
            </div>

            <!-- List -->
            <div id="historyList">
                <div style="text-align:center; padding:2rem; color:var(--text-muted);">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> กำลังโหลดข้อมูล...
                </div>
            </div>

            <!-- Report Export -->
            <div class="report-section">
                <i class="fa-solid fa-file-medical" style="font-size:2rem; color:white; margin-bottom:0.5rem;"></i>
                <h3 style="color:white; font-size:1rem; margin-bottom:0.5rem;">สรุปรายงานสุขภาพ</h3>
                <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1rem;">
                    ส่งรายงานสุขภาพประจำเดือน/ปี เข้าอีเมลของคุณเพื่อใช้ปรึกษาแพทย์
                </p>
                <button class="btn-primary" onclick="sendReport()">
                    <i class="fa-regular fa-envelope"></i> ส่งรายงานเข้าอีเมล
                </button>
            </div>
        </div>

        <!-- Bottom Nav -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item active" onclick="location.href='history.html'"><i class="fa-solid fa-chart-pie"></i>
            </div>
            <div class="nav-item" onclick="location.href='chatbot.html'"><i class="fa-solid fa-comment-dots"></i></div>
            <div class="nav-item" onclick="location.href='settings.html'"><i class="fa-solid fa-gear"></i></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rjszmmogkiblqojikcow.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RoboGAH-Nqm1dQi3ORqYUQ_StZ7uU4Y';
        let _supabase;
        let currentFilter = 'all';
        let currentTimeFilter = 'all';
        let activeTab = 'health'; // 'health' or 'chat'
        let cachedHealthItems = [];
        let cachedChatItems = [];

        document.addEventListener('DOMContentLoaded', async () => {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Apply Theme Logic
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user && user.user_metadata && user.user_metadata.theme) {
                    document.body.classList.remove('theme-youth', 'theme-working', 'theme-elder');
                    document.body.classList.add(`theme-${user.user_metadata.theme}`);
                }
            } catch (e) { console.warn("Theme load failed", e); }

            loadHistory();
        });

        async function loadHistory() {
            const list = document.getElementById('historyList');
            if (!list) return;

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) return;

                // Load Health Data ONLY if on health tab or cache empty
                if (activeTab === 'health' && cachedHealthItems.length === 0) {
                    let allItems = [];

                    // FETCH ALL HEALTH TABLES
                    const tables = ['excretion_logs', 'sleep_logs', 'exercise_logs', 'medication_logs', 'goal_logs', 'period_logs', 'food_logs', 'vehicle_logs', 'appointment_logs'];

                    for (const table of tables) {
                        try {
                            const { data } = await _supabase.from(table).select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                            if (data) {
                                const mapped = data.map(l => ({ ...l, type: table.replace('_logs', '') }));
                                allItems = allItems.concat(mapped);
                            }
                        } catch (e) { console.warn(`Fetch ${table} failed`, e); }
                    }

                    // Fallbacks and cleanup for health items
                    // (Omitted standard sort for brevity in cache, each render handles filtering)
                    cachedHealthItems = allItems.sort((a, b) => new Date(b.created_at || b.appointment_date) - new Date(a.created_at || a.appointment_date));
                }

                // Load Chat Data ONLY if on chat tab or cache empty
                if (activeTab === 'chat' && cachedChatItems.length === 0) {
                    try {
                        const { data } = await _supabase.from('chat_history').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                        if (data) cachedChatItems = data;
                    } catch (e) { console.warn("Chat fetch failed", e); }
                }

                renderCurrentView();

            } catch (e) {
                console.error(e);
                list.innerHTML = '<p style="text-align:center; color:white;">โหลดข้อมูลไม่สำเร็จ</p>';
            }
        }

        function switchView(tab) {
            activeTab = tab;

            // Update UI
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const index = tab === 'health' ? 0 : 1;
            document.querySelectorAll('.tab-btn')[index].classList.add('active');

            // Show/Hide health filters
            document.getElementById('healthFilters').style.display = tab === 'health' ? 'flex' : 'none';
            document.querySelector('.report-section').style.display = tab === 'health' ? 'block' : 'none';

            loadHistory(); // Trigger load if cache empty or just re-render
        }

        function renderCurrentView() {
            if (activeTab === 'health') {
                renderHealthList(cachedHealthItems);
            } else {
                renderChatList(cachedChatItems);
            }
        }

        function renderHealthList(items) {
            const list = document.getElementById('historyList');

            // Filters
            let filtered = items;
            const now = new Date();

            if (currentTimeFilter === 'week') {
                const oneWeekAgo = new Date(); oneWeekAgo.setDate(now.getDate() - 7);
                filtered = filtered.filter(i => new Date(i.created_at || i.appointment_date) >= oneWeekAgo);
            } else if (currentTimeFilter === 'month') {
                const oneMonthAgo = new Date(); oneMonthAgo.setDate(now.getDate() - 30);
                filtered = filtered.filter(i => new Date(i.created_at || i.appointment_date) >= oneMonthAgo);
            }

            if (currentFilter !== 'all') {
                filtered = filtered.filter(i => i.type === currentFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:3rem; opacity:0.6;"><p>ไม่พบประวัติสุขภาพในช่วงนี้</p></div>';
                return;
            }

            // Reuse existing render logic but as a separate function
            // (I'll keep the loop below to ensure it's integrated correctly)
            let html = '';
            filtered.forEach(item => {
                const dateObj = new Date(item.created_at || item.appointment_date);
                const dateStr = dateObj.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                let icon = 'fa-notes-medical';
                let title = 'บันทึก';
                const type = item.type;

                // Map icons
                if (type === 'excretion') { icon = 'fa-toilet'; title = 'การขับถ่าย'; }
                else if (type === 'sleep') { icon = 'fa-bed'; title = 'การนอนหลับ'; }
                else if (type === 'food') { icon = 'fa-utensils'; title = 'มื้ออาหาร'; }
                else if (type === 'appointment') { icon = 'fa-user-doctor'; title = 'นัดหมายแพทย์'; }
                else if (type === 'medication') { icon = 'fa-pills'; title = 'ทานยา'; }
                else if (type === 'goal') { icon = 'fa-bullseye'; title = 'เป้าหมาย'; }
                else if (type === 'vehicle') { icon = 'fa-car'; title = 'ดูแลรถ'; }

                html += `
                    <div class="history-card">
                        <div class="timeline-date"><i class="fa-regular fa-clock"></i> ${dateStr}</div>
                        <div style="display:flex; align-items:center;">
                            <div style="width:35px; height:35px; background:rgba(255,255,255,0.1); border-radius:8px; display:flex; align-items:center; justify-content:center; margin-right:1rem;">
                                <i class="fa-solid ${icon}" style="color:var(--text-color);"></i>
                            </div>
                            <div>
                                <h4 style="color:var(--text-color); font-size:0.95rem; margin:0;">${title}</h4>
                                <p style="color:var(--text-muted); font-size:0.85rem; margin:0;">${item.detail || '-'}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function renderChatList(items) {
            const list = document.getElementById('historyList');
            if (items.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:3rem; opacity:0.6;"><p>ยังไม่มีประวัติการแชท</p></div>';
                return;
            }

            let html = '';
            items.forEach(msg => {
                const dateObj = new Date(msg.created_at);
                const timeStr = dateObj.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                const dateStr = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short' });

                html += `
                    <div class="chat-bubble-container">
                        <div class="chat-bubble ${msg.role}">
                            ${msg.content}
                        </div>
                        <div class="chat-time ${msg.role}">${dateStr} ${timeStr}</div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderCurrentView();
        }

        function setTimeFilter(filter) {
            currentTimeFilter = filter;
            renderCurrentView();
        }

        async function sendReport() {
            const btn = document.querySelector('.report-section .btn-primary');
            const originalHTML = btn.innerHTML;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังสร้างรายงาน...';
            btn.disabled = true;

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user || !user.email) {
                    alert('ไม่พบข้อมูลอีเมลผู้ใช้งาน กรุณาเข้าสู่ระบบใหม่');
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    return;
                }

                const email = user.email;

                // Get Filter Names for Title
                const timeSelect = document.getElementById('timeFilterSelect');
                const catSelect = document.getElementById('filterSelect');
                const timeText = timeSelect.options[timeSelect.selectedIndex].text;
                const catText = catSelect.options[catSelect.selectedIndex].text;

                const reportTitle = `สรุปรายงานสุขภาพ (${catText} - ${timeText})`;

                // Generate detailed list from visible cards
                let dataRows = '';
                const uniqueCards = new Set(); // Prevent duplicates if any
                document.querySelectorAll('.history-card').forEach(card => {
                    const dateEl = card.querySelector('.timeline-date');
                    const titleEl = card.querySelector('h4');
                    const detailEl = card.querySelector('p');

                    const date = dateEl ? dateEl.innerText.trim() : '-';
                    const title = titleEl ? titleEl.innerText.trim() : '-';
                    const detail = detailEl ? detailEl.innerText.trim() : '-';

                    // Simple key to check uniqueness
                    const key = `${date}-${title}`;
                    if (!uniqueCards.has(key)) {
                        uniqueCards.add(key);
                        dataRows += `
                            <tr style="border-bottom: 1px solid #eee;">
                                <td style="padding: 10px;">${date}</td>
                                <td style="padding: 10px; font-weight:bold;">${title}</td>
                                <td style="padding: 10px; color:#666;">${detail}</td>
                            </tr>
                        `;
                    }
                });

                const reportContent = `
                    <div style="font-family: 'Sarabun', sans-serif; padding: 20px; color: #333; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 10px;">
                        <div style="text-align: center; padding-bottom: 20px; border-bottom: 2px solid #a855f7;">
                            <h1 style="color: #a855f7; margin: 0;">CareFate</h1>
                            <p style="margin-top: 5px; color: #666;">${reportTitle}</p>
                        </div>
                        
                        <div style="padding: 20px 0;">
                            <p><strong>เรียนคุณ:</strong> ${email}</p>
                            <p>นี่คือข้อมูลบันทึกสุขภาพของคุณจากแอปพลิเคชัน CareFate</p>
                        </div>

                        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                            <thead>
                                <tr style="background-color: #f8f0fc; color: #6b21a8;">
                                    <th style="padding: 10px; border-radius: 5px 0 0 5px;">วัน/เวลา</th>
                                    <th style="padding: 10px;">ประเภท</th>
                                    <th style="padding: 10px; border-radius: 0 5px 5px 0;">รายละเอียด</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${dataRows || '<tr><td colspan="3" style="padding:20px; text-align:center;">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr>'}
                            </tbody>
                        </table>

                        <div style="text-align: center; margin-top: 30px;">
                            <a href="${window.location.origin}/dashboard.html" style="background-color: #a855f7; color: white; padding: 12px 25px; text-decoration: none; border-radius: 25px; font-weight: bold; display: inline-block; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);">
                                <i class="fa-solid fa-house"></i> กลับสู่แอปพลิเคชัน
                            </a>
                        </div>

                        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999; text-align: center;">
                            <p>ส่งจากระบบอัตโนมัติ CareFate (ดูแลชะตา)</p>
                        </div>
                    </div>
                `;

                const response = await fetch('/api/send-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        report_html: reportContent
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    if (result.mode === 'simulation') {
                        alert(`[โหมดจำลอง] ระบบส่งอีเมลเสมือนไปยัง ${email} แล้ว\n(แก้ไข main.py เพื่อใส่อีเมลจริง)`);
                    } else {
                        alert(`ส่งรายงานสรุปไปยัง ${email} เรียบร้อยแล้ว!`);
                    }
                } else {
                    // Handle FastAPI errors (detail) or custom errors (message)
                    const errorMsg = result.message || (result.detail ? JSON.stringify(result.detail) : JSON.stringify(result));
                    alert(`เกิดข้อผิดพลาดในการส่งอีเมล: ${errorMsg}`);
                }

            } catch (e) {
                console.error(e);
                alert('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
