<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareFate - ประวัติสุขภาพ</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=10">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        .filter-bar {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 0;
            margin-bottom: 1rem;
        }

        .filter-chip {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: rgba(168, 85, 247, 0.2);
            border-color: #a855f7;
            color: var(--text-color);
        }

        .history-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            border: 1px solid var(--card-border);
        }

        .timeline-date {
            font-size: 0.8rem;
            color: #a855f7;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .report-section {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            margin-top: 2rem;
            margin-bottom: 5rem;
        }

        /* Tab Styles */
        .history-tabs {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 4px;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        /* Chat Specific Styles for History View */
        .chat-bubble-container {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 4px;
            position: relative;
        }

        .chat-bubble.user {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-bubble.bot {
            align-self: flex-start;
            background: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--card-border);
            border-bottom-left-radius: 4px;
        }

        .chat-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin: 0 5px 8px;
        }

        .chat-time.user {
            text-align: right;
        }

        .chat-time.bot {
            text-align: left;
        }

        /* ===== GLOBAL THEME REDESIGN (Match Dashboard Frame) ===== */
        body.theme-youth,
        body.theme-working,
        body.theme-elder {
            background: #d1d5db !important; /* Gray outer background like React preview */
            position: relative;
        }

        body.theme-youth .app-container,
        body.theme-working .app-container,
        body.theme-elder .app-container {
            border: 10px solid #ffffff !important;
            border-radius: 64px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            backdrop-filter: none !important;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        body.theme-youth .app-container { background: #FAF9FF !important; }
        body.theme-working .app-container { background: #f0f9ff !important; }
        body.theme-elder .app-container { background: #fff7ed !important; }

        /* Aura Backgrounds (Hidden for pure white background) */
        body.theme-youth .app-container::before, body.theme-youth .app-container::after,
        body.theme-working .app-container::before, body.theme-working .app-container::after,
        body.theme-elder .app-container::before, body.theme-elder .app-container::after {
            display: none !important;
        }

        /* Bottom Nav (Flush to bottom) */
        body.theme-youth .bottom-nav,
        body.theme-working .bottom-nav,
        body.theme-elder .bottom-nav {
            bottom: 0; left: 0; right: 0; height: 86px; border-radius: 0;
            width: 100% !important; padding-bottom: 15px; /* space for home indicator */
            background: rgba(255, 255, 255, 0.98) !important; 
            border: none !important; border-top: 2px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: none !important;
            z-index: 40;
            display: flex; justify-content: space-around; align-items: center;
        }

        body.theme-youth .nav-item,
        body.theme-working .nav-item,
        body.theme-elder .nav-item { 
            width: 60px; height: 60px; border-radius: 50%; background: transparent !important;
            position: relative; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; z-index: 2; opacity: 0.6;
        }
        
        body.theme-youth .nav-item i,
        body.theme-working .nav-item i,
        body.theme-elder .nav-item i { font-size: 1.4rem; z-index: 2; }
        
        body.theme-youth .nav-item.active,
        body.theme-working .nav-item.active,
        body.theme-elder .nav-item.active { opacity: 1; }
        
        body.theme-youth .nav-item.active i,
        body.theme-working .nav-item.active i,
        body.theme-elder .nav-item.active i { transform: scale(1.1); }
        
        /* Glowing effect base */
        body .nav-item::before {
            content: ''; position: absolute; width: 36px; height: 36px; border-radius: 50%;
            filter: blur(14px); opacity: 0; transition: opacity 0.3s; z-index: 1;
        }
        body .nav-item.active::before { opacity: 0.35; }

        /* Youth Colors */
        body.theme-youth .nav-item { color: #c084fc; }
        body.theme-youth .nav-item.active { color: #a855f7 !important; }
        body.theme-youth .nav-item::before { background: #a855f7; }

        /* Working Colors */
        body.theme-working .nav-item { width: 55px; height: 55px; color: #94a3b8; }
        body.theme-working .nav-item.active { background: rgba(16, 185, 129, 0.12) !important; border-radius: 20px !important; }
        body.theme-working .nav-item i { color: #94a3b8 !important; opacity: 1 !important; }
        body.theme-working .nav-item.active i { color: #0891b2 !important; transform: scale(1.05); }
        body.theme-working .nav-item::before { display: none !important; }

        /* Elder Colors */
        body.theme-elder .nav-item { color: #fdbab7; }
        body.theme-elder .nav-item.active { background: #dcfce3 !important; border-radius: 20px !important; }
        body.theme-elder .nav-item i { color: #fdbab7 !important; opacity: 1 !important; }
        body.theme-elder .nav-item.active i { color: #059669 !important; }
        body.theme-elder .nav-item::before { display: none !important; }
    </style>
</head>

<body class="theme-working page-feature">
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="app-container" style="display:flex; flex-direction:column; padding:0 !important; overflow:hidden; position:relative;">
        <!-- Status Bar -->
        <div class="status-bar" style="position:relative; z-index:20; height:56px; width:100%; display:flex; justify-content:space-between; align-items:center; padding:8px 40px 0; flex-shrink:0;">
            <span class="time" id="statusBarTime" style="font-size:0.875rem; font-weight:700; color:#1e293b;">9:41</span>
            <div class="status-icons" style="display:flex; gap:6px; align-items:center;">
                <div class="battery" style="width:20px;height:10px;background:#cbd5e1;border-radius:2px;"></div>
                <div class="signal" style="width:12px;height:12px;background:#cbd5e1;border-radius:50%;"></div>
            </div>
        </div>

        <!-- Header Container (with padding) -->
        <div style="padding: 1.5rem 1.5rem 0.5rem; display:flex; align-items:center;">
            <button onclick="location.href='dashboard.html'"
                style="background:none; border:none; padding:0.5rem; cursor:pointer; color:var(--text-color);">
                <i class="fa-solid fa-arrow-left" style="font-size:1.5rem;"></i>
            </button>
            <h1
                style="flex:1; text-align:center; font-size:1.2rem; margin:0; font-weight:600; color:var(--text-color);">
                ประวัติสุขภาพ</h1>
            <div style="width:35px;"></div>
        </div>

        <div style="padding: 0 1.5rem 2rem; flex:1; overflow-y:auto; width:100%;">

            <!-- Tab Switcher -->
            <div class="history-tabs">
                <button class="tab-btn active" onclick="switchView('health')">
                    <i class="fa-solid fa-notes-medical"></i> บันทึกสุขภาพ
                </button>
                <button class="tab-btn" onclick="switchView('chat')">
                    <i class="fa-solid fa-message"></i> ประวัติการแชท
                </button>
            </div>

            <!-- Filters (Categories) - Only visible for health logs -->
            <div id="healthFilters" class="filter-bar" style="overflow:visible; gap:10px; align-items:center;">
                <span style="font-size:0.9rem; color:var(--text-color); white-space:nowrap;">แสดง:</span>

                <!-- Time Filter -->
                <select id="timeFilterSelect" onchange="setTimeFilter(this.value)" style="
                    background: var(--card-bg);
                    border: 1px solid var(--card-border);
                    color: var(--text-color);
                    padding: 0.5rem 1rem;
                    border-radius: 12px;
                    font-size: 0.9rem;
                    width: auto;
                    min-width: 120px;
                    outline: none;
                    cursor: pointer;
                    font-family: 'Outfit', sans-serif;
                ">
                    <option value="all">ทั้งหมด</option>
                    <option value="week">สัปดาห์นี้</option>
                    <option value="month">เดือนนี้</option>
                </select>

                <!-- Category Filter -->
                <select id="filterSelect" onchange="setFilter(this.value)" style="
                    background: var(--card-bg);
                    border: 1px solid var(--card-border);
                    color: var(--text-color);
                    padding: 0.5rem 1rem;
                    border-radius: 12px;
                    font-size: 0.9rem;
                    width: 100%;
                    outline: none;
                    cursor: pointer;
                    font-family: 'Outfit', sans-serif;
                ">
                    <option value="all">ทุกหมวดหมู่</option>
                    <option value="exercise">เน้นการเล่นกีฬาและกิจกรรม</option>
                    <option value="goal">ตั้งเป้าหมายการเรียน/ชีวิต</option>
                    <option value="period">บันทึกรอบเดือน</option>
                </select>
            </div>

            <!-- List -->
            <div id="historyList">
                <div style="text-align:center; padding:2rem; color:var(--text-muted);">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> กำลังโหลดข้อมูล...
                </div>
            </div>

            <!-- Report Export -->
            <div class="report-section">
                <i class="fa-solid fa-file-medical" style="font-size:2rem; color:white; margin-bottom:0.5rem;"></i>
                <h3 style="color:white; font-size:1rem; margin-bottom:0.5rem;">สรุปรายงานสุขภาพ</h3>
                <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1rem;">
                    ส่งรายงานสุขภาพประจำเดือน/ปี เข้าอีเมลของคุณเพื่อใช้ปรึกษาแพทย์
                </p>
                <button class="btn-primary" onclick="sendReport()">
                    <i class="fa-regular fa-envelope"></i> ส่งรายงานเข้าอีเมล
                </button>
            </div>
        </div>

        <!-- Bottom Nav -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="location.href='dashboard.html'"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item active" onclick="location.href='history.html'"><i class="fa-solid fa-chart-pie"></i></div>
            <div class="nav-item" onclick="location.href='chatbot.html'"><i class="fa-solid fa-comment"></i></div>
            <div class="nav-item" onclick="location.href='settings.html'"><i class="fa-solid fa-gear"></i></div>
        </div>

        <!-- Bottom Bar (Home Indicator) -->
        <div class="home-indicator" style="position:absolute; bottom:0; width:100%; height:32px; display:flex; justify-content:center; align-items:center; z-index:30;">
            <div class="indicator-bar" style="width:130px; height:5px; background:#cbd5e1; border-radius:9999px;"></div>
        </div>
    </div>

    <script>
        // Real-time Status Bar Clock
        function updateStatusBarTime() {
            const timeElement = document.getElementById('statusBarTime');
            if (!timeElement) return;
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            minutes = minutes < 10 ? '0' + minutes : minutes;
            timeElement.textContent = `${hours}:${minutes}`;
        }

        const SUPABASE_URL = 'https://rjszmmogkiblqojikcow.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_RoboGAH-Nqm1dQi3ORqYUQ_StZ7uU4Y';
        let _supabase;
        let currentFilter = 'all';
        let currentTimeFilter = 'all';
        let activeTab = 'health'; // 'health' or 'chat'
        let cachedHealthItems = [];
        let cachedChatItems = [];

        document.addEventListener('DOMContentLoaded', async () => {
            _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Apply Theme Logic
            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (user && user.user_metadata && user.user_metadata.theme) {
                    document.body.classList.remove('theme-youth', 'theme-working', 'theme-elder');
                    document.body.classList.add(`theme-${user.user_metadata.theme}`);
                }
            } catch (e) { console.warn("Theme load failed", e); }

            // Status Bar Clock
            updateStatusBarTime();
            setInterval(updateStatusBarTime, 1000);

            loadHistory();
        });

        async function loadHistory() {
            const list = document.getElementById('historyList');
            if (!list) return;

            try {
                const { data: { user } } = await _supabase.auth.getUser();
                if (!user) return;

                // Load Health Data ONLY if on health tab or cache empty
                if (activeTab === 'health' && cachedHealthItems.length === 0) {
                    let allItems = [];

                    // FETCH ALL HEALTH TABLES
                    const tables = ['exercise_logs', 'goal_logs', 'period_logs'];

                    for (const table of tables) {
                        try {
                            const { data } = await _supabase.from(table).select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                            if (data) {
                                const mapped = data.map(l => ({ ...l, type: table.replace('_logs', '') }));
                                allItems = allItems.concat(mapped);
                            }
                        } catch (e) { console.warn(`Fetch ${table} failed`, e); }
                    }

                    // Merge exercise logs from localStorage (fallback in case Supabase insert failed)
                    try {
                        const localExLogs = JSON.parse(localStorage.getItem('exercise_logs') || '[]');
                        console.log("Found local exercise logs:", localExLogs);
                        const dbTimestamps = new Set(allItems.filter(i => i.type === 'exercise').map(i => i.created_at));
                        const pendingLocal = localExLogs
                            .filter(l => !dbTimestamps.has(l.created_at))
                            .map(l => ({ ...l, type: 'exercise', _local: true }));
                        console.log("Pending local logs to merge:", pendingLocal);
                        if (pendingLocal.length > 0) {
                            allItems = allItems.concat(pendingLocal);
                        }
                    } catch (e) { console.warn('LocalStorage exercise merge failed', e); }

                    // Fallbacks and cleanup for health items
                    // (Omitted standard sort for brevity in cache, each render handles filtering)
                    cachedHealthItems = allItems.sort((a, b) => new Date(b.created_at || b.appointment_date) - new Date(a.created_at || a.appointment_date));
                    console.log("All cached health items after merge:", cachedHealthItems);
                }

                // Load Chat Data ONLY if on chat tab or cache empty
                if (activeTab === 'chat' && cachedChatItems.length === 0) {
                    try {
                        const { data } = await _supabase.from('chat_history').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
                        if (data) cachedChatItems = data;
                    } catch (e) { console.warn("Chat fetch failed", e); }
                }

                renderCurrentView();

            } catch (e) {
                console.error(e);
                list.innerHTML = '<p style="text-align:center; color:red; padding:2rem;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }

        function switchView(tab) {
            activeTab = tab;

            // Update UI
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const index = tab === 'health' ? 0 : 1;
            document.querySelectorAll('.tab-btn')[index].classList.add('active');

            // Show/Hide health filters
            document.getElementById('healthFilters').style.display = tab === 'health' ? 'flex' : 'none';
            document.querySelector('.report-section').style.display = tab === 'health' ? 'block' : 'none';

            loadHistory(); // Trigger load if cache empty or just re-render
        }

        function renderCurrentView() {
            console.log("Rendering view, activeTab:", activeTab, "health items count:", cachedHealthItems.length);
            if (activeTab === 'health') {
                renderHealthList(cachedHealthItems);
            } else {
                renderChatList(cachedChatItems);
            }
        }

        async function renderHealthList(items) {
            const list = document.getElementById('historyList');

            // Filters
            let filtered = items;
            const now = new Date();

            if (currentTimeFilter === 'week') {
                // Start from Monday of this calendar week at midnight
                const startOfWeek = new Date();
                startOfWeek.setHours(0, 0, 0, 0);
                const day = startOfWeek.getDay(); // 0=Sun, 1=Mon,...
                const diffToMonday = day === 0 ? -6 : 1 - day;
                startOfWeek.setDate(startOfWeek.getDate() + diffToMonday);
                filtered = filtered.filter(i => new Date(i.created_at || i.appointment_date) >= startOfWeek);
            } else if (currentTimeFilter === 'month') {
                // Start from the 1st of this calendar month at midnight
                const startOfMonth = new Date();
                startOfMonth.setDate(1);
                startOfMonth.setHours(0, 0, 0, 0);
                filtered = filtered.filter(i => new Date(i.created_at || i.appointment_date) >= startOfMonth);
            }

            if (currentFilter !== 'all') {
                filtered = filtered.filter(i => i.type === currentFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding:3rem; opacity:0.6;"><p>ไม่พบประวัติสุขภาพ</p></div>';
                return;
            }

            // Reuse existing render logic but as a separate function
            // (I'll keep the loop below to ensure it's integrated correctly)
            let html = '';
            filtered.forEach(item => {
                const dateObj = new Date(item.created_at || item.appointment_date);
                const dateStr = dateObj.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                let icon = 'fa-notes-medical';
                let title = 'บันทึก';
                let detailText = '-';

                const type = item.type;

                // Map icons & build detail per type
                let iconBg = 'rgba(255,255,255,0.1)';
                let iconColor = 'var(--text-color)';
                let detailHighlightColor = 'var(--primary-color)';

                if (document.body.classList.contains('theme-working')) {
                    iconColor = '#0d9488';
                    iconBg = '#f0fdf4'; // light green background
                    detailHighlightColor = '#0d9488';
                }

                if (type === 'exercise') {
                    icon = 'fa-heart-pulse'; title = 'เน้นการเล่นกีฬาและกิจกรรม';
                    // Backward compatibility: DB uses detail/note. Old local storage uses activity/duration/intensity/calories.
                    if (item.detail || item.note) {
                        detailText = item.detail || '-';
                        if (item.note && item.note.trim() !== '') {
                            detailText = item.detail
                                ? `${item.detail} — <span style="color:${detailHighlightColor}; font-weight:600;">${item.note}</span>`
                                : item.note;
                        }
                    } else if (item.activity) {
                        // Old format map
                        const intensityText = item.intensity ? `(${item.intensity})` : '';
                        detailText = `<span style="color:${detailHighlightColor}; font-weight:600;">${item.activity} / กีฬา${item.activity} — ${item.duration} นาที | ${item.calories} kcal ${intensityText}</span>`;
                    } else {
                        detailText = '-';
                    }
                }
                else if (type === 'period') {
                    icon = 'fa-droplet'; title = 'บันทึกรอบเดือน';
                    const parts = [];
                    if (item.cycle_start || item.start_date) parts.push(`เริ่ม: ${item.cycle_start || item.start_date}`);
                    if (item.cycle_length) parts.push(`รอบ: ${item.cycle_length} วัน`);
                    if (item.period_length) parts.push(`ระยะเวลา: ${item.period_length} วัน`);
                    if (item.symptom || item.symptoms) parts.push(item.symptom || item.symptoms);
                    if (item.note) parts.push(item.note);
                    if (item.detail) parts.push(item.detail);
                    detailText = parts.join(' — ') || '-';
                }
                else if (type === 'goal') {
                    icon = 'fa-bullseye'; title = 'ตั้งเป้าหมายการเรียน/ชีวิต';
                    const parts = [];
                    if (item.goal_text || item.title || item.goal) parts.push(item.goal_text || item.title || item.goal);
                    if (item.status) parts.push(`<span style="color:var(--primary-color); font-weight:600;">${item.status}</span>`);
                    if (item.note) parts.push(item.note);
                    if (item.detail) parts.push(item.detail);
                    detailText = parts.join(' — ') || '-';
                }
                else {
                    // Generic fallback
                    detailText = item.detail || '-';
                    if (item.note && item.note !== item.detail && item.note.trim() !== '') {
                        detailText = item.detail
                            ? `${item.detail} — <span style="color:var(--primary-color); font-weight:600;">${item.note}</span>`
                            : item.note;
                    }
                }

                html += `
                    <div class="history-card">
                        <div class="timeline-date"><i class="fa-regular fa-clock"></i> ${dateStr}</div>
                        <div style="display:flex; align-items:center;">
                            <div style="width:48px; height:48px; background:${iconBg}; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-right:1rem; flex-shrink:0;">
                                <i class="fa-solid ${icon}" style="color:${iconColor}; font-size:1.2rem;"></i>
                            </div>

        function parsePeriodData(items) {
            const periodLogs = items.filter(item => item.type === 'period');
            
            // Sort oldest to newest
            periodLogs.sort((a, b) => new Date(a.created_at || a.appointment_date) - new Date(b.created_at || b.appointment_date));
            
            const cycles = [];
            let currentCycle = null;
            const symptomCounts = {};
            let totalSymptomLogs = 0;
            
            periodLogs.forEach(log => {
                const dateObj = new Date(log.created_at || log.appointment_date);
                const dateStr = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
                
                const note = (log.note || '').trim();
                const detail = (log.detail || '').trim();
                
                const isStart = note === 'ประจำเดือนเริ่มมา' || detail === 'ประจำเดือนเริ่มมา' || note === 'รอบเดือนใหม่' || detail === 'รอบเดือนใหม่';
                const isEnd = note === 'ประจำเดือนหมด' || detail === 'ประจำเดือนหมด';
                const isSymptoms = note === 'บันทึกอาการประจำเดือน' || detail === 'บันทึกอาการประจำเดือน';
                
                if (isStart) {
                    if (cycles.length > 0) {
                        const prev = cycles[cycles.length - 1];
                        const diffTime = Math.abs(dateObj - prev.startDateObj);
                        prev.cycleLength = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    }
                    
                    currentCycle = {
                        id: log.id,
                        startDate: dateStr,
                        startDateObj: dateObj,
                        endDate: null,
                        periodDuration: 5,
                        cycleLength: 28,
                        symptoms: []
                    };
                    cycles.push(currentCycle);
                } else if (isEnd) {
                    let duration = 5;
                    const durMatch = detail.match(/ระยะเวลา:\s*(\d+)\s*วัน/) || note.match(/ระยะเวลา:\s*(\d+)\s*วัน/);
                    if (durMatch) {
                        duration = parseInt(durMatch[1]);
                    } else if (currentCycle) {
                        const diffTime = Math.abs(dateObj - currentCycle.startDateObj);
                        duration = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                    }
                    
                    if (currentCycle) {
                        currentCycle.endDate = dateStr;
                        currentCycle.periodDuration = duration;
                    } else {
                        const placeholderStart = new Date(dateObj);
                        placeholderStart.setDate(dateObj.getDate() - duration + 1);
                        currentCycle = {
                            startDate: placeholderStart.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' }),
                            startDateObj: placeholderStart,
                            endDate: dateStr,
                            periodDuration: duration,
                            cycleLength: 28,
                            symptoms: []
                        };
                        cycles.push(currentCycle);
                    }
                } else if (isSymptoms) {
                    const symText = note === 'บันทึกอาการประจำเดือน' ? detail : note;
                    if (symText && symText !== '-') {
                        const parts = symText.split(',').map(s => s.trim());
                        parts.forEach(s => {
                            if (s) {
                                symptomCounts[s] = (symptomCounts[s] || 0) + 1;
                                totalSymptomLogs++;
                                if (currentCycle) {
                                    currentCycle.symptoms.push(s);
                                }
                            }
                        });
                    }
                }
            });
            
            cycles.sort((a, b) => b.startDateObj - a.startDateObj);
            return { cycles, symptomCounts, totalSymptomLogs };
        }

        function parseExerciseData(items) {
            const exerciseLogs = items.filter(item => item.type === 'exercise');
            
            // Sort oldest to newest
            exerciseLogs.sort((a, b) => new Date(a.created_at || a.appointment_date) - new Date(b.created_at || b.appointment_date));
            
            let totalDuration = 0;
            let totalCalories = 0;
            const activityCounts = {};
            const recentSessions = [];
            
            exerciseLogs.forEach(log => {
                let duration = 30; // Default
                const durMatch = (log.note || '').match(/(\d+)\s*นาที/) || (log.detail || '').match(/(\d+)\s*นาที/);
                if (durMatch) {
                    duration = parseInt(durMatch[1]);
                } else if (log.duration) {
                    duration = parseInt(log.duration);
                }
                
                let calories = log.calories || 0;
                if (!calories) {
                    const kcalMatch = (log.note || '').match(/(\d+)\s*kcal/);
                    if (kcalMatch) {
                        calories = parseInt(kcalMatch[1]);
                    }
                }
                
                const activity = log.detail || log.activity || 'ออกกำลังกาย';
                
                totalDuration += duration;
                totalCalories += calories;
                activityCounts[activity] = (activityCounts[activity] || 0) + 1;
                
                recentSessions.push({
                    date: new Date(log.created_at || log.appointment_date).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' }),
                    activity: activity,
                    duration: duration,
                    calories: calories,
                    note: log.note || ''
                });
            });
            
            let topActivity = 'ไม่มี';
            let maxCount = 0;
            for (const [act, count] of Object.entries(activityCounts)) {
                if (count > maxCount) {
                    maxCount = count;
                    topActivity = act;
                }
            }
            
            recentSessions.reverse();
            const topActivityText = maxCount > 0 ? `${topActivity} (${maxCount} ครั้ง)` : 'ไม่มีการบันทึก';
            
            return {
                totalDuration,
                totalCalories,
                topActivityText,
                recentSessions: recentSessions.slice(0, 5)
            };
        }

        function parseGoalData(items) {
            const goalLogs = items.filter(item => item.type === 'goal');
            
            // Sort oldest to newest
            goalLogs.sort((a, b) => new Date(a.created_at || a.appointment_date) - new Date(b.created_at || b.appointment_date));
            
            const goalStates = {};
            
            goalLogs.forEach(log => {
                const name = log.detail || 'เป้าหมาย';
                const status = (log.note || '').trim();
                const isCompleted = status === 'เป้าหมายสำเร็จ' || status === 'สำเร็จแล้ว' || status === 'สำเร็จ';
                
                goalStates[name] = {
                    name: name,
                    isCompleted: isCompleted,
                    date: new Date(log.created_at || log.appointment_date).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })
                };
            });
            
            const uniqueGoals = Object.values(goalStates);
            const totalGoals = uniqueGoals.length;
            const completedCount = uniqueGoals.filter(g => g.isCompleted).length;
            const completionRate = totalGoals > 0 ? Math.round((completedCount / totalGoals) * 100) : 0;
            
            return {
                totalGoals,
                completedCount,
                completionRate,
                goalsList: uniqueGoals.reverse()
            };
        }

                        exerciseInsight = 'ระยะเวลาการออกกำลังกายเฉลี่ยของคุณคือ <strong>' + avgDuration.toFixed(0) + ' นาทีต่อครั้ง</strong> ซึ่งน้อยกว่า 30 นาที แนะนำให้ค่อยๆ เพิ่มการออกกำลังกายระดับปานกลางเป็น 30-45 นาทีต่อครั้ง เพื่อช่วยเพิ่มประสิทธิภาพของระบบหมุนเวียนเลือดและสร้างความฟิตได้อย่างเต็มที่';
                    } else if (avgDuration >= 30) {
                        exerciseInsight = 'ยอดเยี่ยมมาก! ระยะเวลาออกกำลังกายเฉลี่ยของคุณอยู่ที่ <strong>' + avgDuration.toFixed(0) + ' นาทีต่อครั้ง</strong> ซึ่งอยู่ในเกณฑ์แนะนำของแพทย์ ช่วยกระตุ้นระบบเผาผลาญและรักษาสุขภาพหัวใจได้อย่างดีเยี่ยม ควรควบคุมความสม่ำเสมอสัปดาห์ละ 3-5 วัน';
                    }

                    exerciseAnalyticsHtml = `
                        <!-- Exercise Health Analytics Dashboard -->
                        <div style="margin-top: 20px; margin-bottom: 25px; background: #fff; border: 1.5px solid #ffedd5; border-radius: 16px; padding: 20px; font-family: 'Sarabun', sans-serif;">
                            <div style="display: block; padding-bottom: 12px; border-bottom: 2px dashed #ffedd5; margin-bottom: 15px;">
                                <h2 style="color: #ea580c; margin: 0; font-size: 16px; font-weight: 700; display: inline-block; vertical-align: middle;">🏃 รายงานวิเคราะห์กิจกรรมและการออกกำลังกาย (Exercise Analytics)</h2>
                            </div>
                            
                            <!-- Metrics Row -->
                            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                                <tr>
                                    <td style="width: 33.3%; padding-right: 4px; vertical-align: top;">
                                        <div style="background-color: #fff7ed; border: 1px solid #ffedd5; border-radius: 12px; padding: 12px; text-align: center; height: 50px;">
                                            <span style="font-size: 10px; color: #c2410c; font-weight: bold;">เวลารวม</span>
                                            <div style="font-size: 16px; font-weight: bold; color: #ea580c; margin-top: 6px;">${totalDuration} นาที</div>
                                        </div>
                                    </td>
                                    <td style="width: 33.3%; padding: 0 4px; vertical-align: top;">
                                        <div style="background-color: #fff7ed; border: 1px solid #ffedd5; border-radius: 12px; padding: 12px; text-align: center; height: 50px;">
                                            <span style="font-size: 10px; color: #c2410c; font-weight: bold;">แคลอรีสะสม</span>
                                            <div style="font-size: 16px; font-weight: bold; color: #ea580c; margin-top: 6px;">${totalCalories} kcal</div>
                                        </div>
                                    </td>
                                    <td style="width: 33.3%; padding-left: 4px; vertical-align: top;">
                                        <div style="background-color: #f0fdf4; border: 1px solid #dcfce7; border-radius: 12px; padding: 12px; text-align: center; height: 50px;">
                                            <span style="font-size: 10px; color: #15803d; font-weight: bold;">กิจกรรมยอดฮิต</span>
                                            <div style="font-size: 12px; font-weight: bold; color: #16a34a; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${topActivityText}">${topActivityText}</div>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <!-- Graph Section -->
                            <div style="margin-bottom: 20px;">
                                <div style="font-size: 13px; font-weight: bold; color: #ea580c; margin-bottom: 10px; display: block;">
                                    🟧 ระยะเวลากิจกรรม (นาที) vs พลังงานที่เผาผลาญ (kcal)
                                </div>
                                ${sessionRows}
                            </div>

                            <!-- Insights Card -->
                            <div style="background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a; border-radius: 12px; padding: 15px; margin-top: 15px;">
                                <div style="font-size: 12px; font-weight: bold; color: #b45309; margin-bottom: 4px;">
                                    💡 คำแนะนำด้านกิจกรรมส่วนบุคคล (Personalized Insights)
                                </div>
                                <div style="font-size: 12px; color: #78350f; line-height: 1.5;">
                                    ${exerciseInsight}
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 3. Goal Analytics Dashboard
                const hasGoalLogs = cachedHealthItems.some(i => i.type === 'goal');
                let goalAnalyticsHtml = '';
                
                if (hasGoalLogs && (selectedCat === 'all' || selectedCat === 'goal')) {
                    const { totalGoals, completedCount, completionRate, goalsList } = parseGoalData(cachedHealthItems);
                    
                    let goalListRows = '';
                    goalsList.slice(0, 5).forEach(g => {
                        const badgeColor = g.isCompleted ? '#10b981' : '#3b82f6';
                        const badgeBg = g.isCompleted ? '#e8fdf4' : '#eff6ff';
                        const statusLabel = g.isCompleted ? 'สำเร็จแล้ว' : 'กำลังดำเนินการ';
                        
                        goalListRows += `
                            <tr style="border-bottom: 1px solid #f1f5f9; font-family: 'Sarabun', sans-serif; font-size: 12px;">
                                <td style="padding: 8px 10px; font-weight: 600; color: #334155;">🎯 ${g.name}</td>
                                <td style="padding: 8px 10px; color: #64748b;">${g.date}</td>
                                <td style="padding: 8px 10px; text-align: right;">
                                    <span style="display: inline-block; padding: 3px 8px; border-radius: 6px; background-color: ${badgeBg}; color: ${badgeColor}; font-weight: bold; font-size: 10px;">
                                        ${statusLabel}
                                    </span>
                                </td>
                            </tr>
                        `;
                    });
                    
                    if (goalListRows === '') {
                        goalListRows = '<tr><td colspan="3" style="text-align: center; color: #94a3b8; font-size: 12px; padding: 15px 0;">ไม่มีข้อมูลเป้าหมายที่บันทึกไว้</td></tr>';
                    }

                    let goalInsight = 'การตั้งเป้าหมายช่วยชี้แนวทางและพัฒนาศักยภาพชีวิต แนะนำให้เริ่มจากสิ่งเล็กๆ ที่ทำได้ทุกวันเพื่อสร้างนิสัยที่ดี';
                    if (completionRate >= 70) {
                        goalInsight = 'สุดยอดมาก! อัตราความสำเร็จในการทำตามเป้าหมายของคุณอยู่ที่ <strong>' + completionRate + '%</strong> ซึ่งถือว่าสูงและยอดเยี่ยมมาก แสดงถึงความมีวินัยและการจัดสรรเวลาได้อย่างมีประสิทธิภาพสูงสุด รักษาจังหวะและมาตรฐานนี้ไว้เพื่อไปสู่ความสำเร็จขั้นถัดไปครับ';
                    } else if (completionRate > 0 && completionRate < 70) {
                        goalInsight = 'คืบหน้าได้ดีทีเดียว! อัตราความสำเร็จอยู่ที่ <strong>' + completionRate + '%</strong> แนะนำเพิ่มเติมให้นำเป้าหมายใหญ่มาซอยย่อยลงเป็นเป้าหมายเล็กๆ รายวัน (Micro-goals) ที่สามารถทำเสร็จได้ในระยะเวลา 5-15 นาที จะช่วยกระตุ้นสมองและส่งเสริมอัตราการทำสำเร็จให้มากขึ้นในแต่ละวัน';
                    }

                    goalAnalyticsHtml = `
                        <!-- Goal Health Analytics Dashboard -->
                        <div style="margin-top: 20px; margin-bottom: 25px; background: #fff; border: 1.5px solid #e0e7ff; border-radius: 16px; padding: 20px; font-family: 'Sarabun', sans-serif;">
                            <div style="display: block; padding-bottom: 12px; border-bottom: 2px dashed #e0e7ff; margin-bottom: 15px;">
                                <h2 style="color: #4f46e5; margin: 0; font-size: 16px; font-weight: 700; display: inline-block; vertical-align: middle;">🎯 รายงานวิเคราะห์การตั้งเป้าหมายและพัฒนาตนเอง (Goal Analytics)</h2>
                            </div>
                            
                            <!-- Metrics Row -->
                            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                                <tr>
                                    <td style="width: 33.3%; padding-right: 4px; vertical-align: top;">
                                        <div style="background-color: #eef2ff; border: 1px solid #e0e7ff; border-radius: 12px; padding: 12px; text-align: center; height: 50px;">
                                            <span style="font-size: 10px; color: #3730a3; font-weight: bold;">เป้าหมายทั้งหมด</span>
                                            <div style="font-size: 16px; font-weight: bold; color: #4f46e5; margin-top: 6px;">${totalGoals} รายการ</div>
                                        </div>
                                    </td>
                                    <td style="width: 33.3%; padding: 0 4px; vertical-align: top;">
                                        <div style="background-color: #ecfdf5; border: 1px solid #d1fae5; border-radius: 12px; padding: 12px; text-align: center; height: 50px;">
                                            <span style="font-size: 10px; color: #065f46; font-weight: bold;">เป้าหมายที่สำเร็จ</span>
                                            <div style="font-size: 16px; font-weight: bold; color: #059669; margin-top: 6px;">${completedCount} รายการ</div>
                                        </div>
                                    </td>
                                    <td style="width: 33.3%; padding-left: 4px; vertical-align: top;">
                                        <div style="background-color: #eef2ff; border: 1px solid #e0e7ff; border-radius: 12px; padding: 12px; text-align: center; height: 50px;">
                                            <span style="font-size: 10px; color: #3730a3; font-weight: bold;">อัตราความสำเร็จ</span>
                                            <div style="font-size: 16px; font-weight: bold; color: #4f46e5; margin-top: 6px;">${completionRate}%</div>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <!-- List Section -->
                            <div style="margin-bottom: 20px;">
                                <div style="font-size: 13px; font-weight: bold; color: #4f46e5; margin-bottom: 10px; display: block;">
                                    🟦 บันทึกความก้าวหน้าเป้าหมายล่าสุด (Goal Progress Log)
                                </div>
                                <table style="width: 100%; border-collapse: collapse;">
                                    <thead>
                                        <tr style="background-color: #fafafb; border-bottom: 1.5px solid #e2e8f0; font-size: 11px; color: #64748b; font-weight: bold; text-align: left;">
                                            <th style="padding: 6px 10px;">เป้าหมาย</th>
                                            <th style="padding: 6px 10px;">บันทึกล่าสุด</th>
                                            <th style="padding: 6px 10px; text-align: right;">สถานะ</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${goalListRows}
                                    </tbody>
                                </table>
                            </div>

                            <!-- Insights Card -->
                            <div style="background: linear-gradient(135deg, #fffbeb, #fef3c7); border: 1px solid #fde68a; border-radius: 12px; padding: 15px; margin-top: 15px;">
                                <div style="font-size: 12px; font-weight: bold; color: #b45309; margin-bottom: 4px;">
                                    💡 คำแนะนำด้านความพยายามส่วนบุคคล (Personalized Insights)
                                </div>
                                <div style="font-size: 12px; color: #78350f; line-height: 1.5;">
                                    ${goalInsight}
                                </div>
                            </div>
                        </div>
                    `;
                }

                const reportContent = `
                    <div style="font-family: 'Sarabun', sans-serif; padding: 20px; color: #333; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 10px;">
                        <div style="text-align: center; padding-bottom: 20px; border-bottom: 2px solid #a855f7;">
                            <h1 style="color: #a855f7; margin: 0;">CareFate</h1>
                            <p style="margin-top: 5px; color: #666;">${reportTitle}</p>
                        </div>
                        
                        <div style="padding: 20px 0;">
                            <p><strong>เรียนคุณ:</strong> ${email}</p>
                            <p>นี่คือข้อมูลบันทึกสุขภาพของคุณจากแอปพลิเคชัน CareFate</p>
                        </div>

                        ${periodAnalyticsHtml}
                        ${exerciseAnalyticsHtml}
                        ${goalAnalyticsHtml}

                        <div style="margin-bottom: 10px; font-size: 14px; font-weight: bold; color: #333;">📋 ประวัติการบันทึกข้อมูลอย่างละเอียด (All Logs)</div>
                        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                            <thead>
                                <tr style="background-color: #f8f0fc; color: #6b21a8;">
                                    <th style="padding: 10px; border-radius: 5px 0 0 5px;">วัน/เวลา</th>
                                    <th style="padding: 10px;">ประเภท</th>
                                    <th style="padding: 10px; border-radius: 0 5px 5px 0;">รายละเอียด</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${dataRows || '<tr><td colspan="3" style="padding:20px; text-align:center;">ไม่พบข้อมูลตามเงื่อนไขที่เลือก</td></tr>'}
                            </tbody>
                        </table>

                        <div style="text-align: center; margin-top: 30px;">
                            <a href="${window.location.origin}/dashboard.html" style="background-color: #a855f7; color: white; padding: 12px 25px; text-decoration: none; border-radius: 25px; font-weight: bold; display: inline-block; box-shadow: 0 4px 10px rgba(168, 85, 247, 0.3);">
                                <i class="fa-solid fa-house"></i> กลับสู่แอปพลิเคชัน
                            </a>
                        </div>

                        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #999; text-align: center;">
                            <p>ส่งจากระบบอัตโนมัติ CareFate (ดูแลชะตา)</p>
                        </div>
                    </div>
                `;

                const response = await fetch('/api/send-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        report_html: reportContent
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    if (result.mode === 'simulation') {
                        alert(`[โหมดจำลอง] ระบบส่งอีเมลเสมือนไปยัง ${email} แล้ว\n(แก้ไข main.py เพื่อใส่อีเมลจริง)`);
                    } else {
                        alert(`ส่งรายงานสรุปไปยัง ${email} เรียบร้อยแล้ว!`);
                    }
                } else {
                    // Handle FastAPI errors (detail) or custom errors (message)
                    const errorMsg = result.message || (result.detail ? JSON.stringify(result.detail) : JSON.stringify(result));
                    alert(`เกิดข้อผิดพลาดในการส่งอีเมล: ${errorMsg}`);
                }

            } catch (e) {
                console.error(e);
                alert('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
